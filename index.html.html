<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Block Builder</title>
    <style>
        :root { --neon-green: #00ff41; }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            position: fixed;
        }

        #status-line {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: var(--neon-green);
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
            text-align: center;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }

        .scanning-text { animation: scanPulse 2s infinite; }

        @keyframes scanPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #start-box {
            border: 2px solid var(--neon-green);
            padding: 48px 32px;
            text-align: center;
            color: var(--neon-green);
            background: rgba(0, 0, 0, 0.95);
            max-width: 340px;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.15);
        }

        #start-box h2 {
            font-size: 16px;
            letter-spacing: 5px;
            margin-bottom: 20px;
            font-weight: normal;
        }

        #start-box p {
            font-size: 11px;
            opacity: 0.6;
            margin-bottom: 28px;
            line-height: 1.7;
            letter-spacing: 1px;
        }

        #btn-start {
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 14px 40px;
            font-family: inherit;
            font-size: 13px;
            letter-spacing: 4px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        #btn-start:active {
            background: var(--neon-green);
            color: #000;
        }

        #btn-start:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        #debug-info {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            color: var(--neon-green);
            font-family: 'Courier New', monospace;
            font-size: 9px;
            letter-spacing: 1px;
            opacity: 0.7;
            text-align: center;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <div id="start-box">
            <h2>AR BLOCK BUILDER</h2>
            <p>SHOW HANDS TO CAMERA<br>
               INDEX FINGER + THUMB TO PLACE<br>
               NEAR FACE TO EXTRUDE</p>
            <button id="btn-start">ENTER AR</button>
        </div>
    </div>

    <div id="status-line" class="scanning-text">READY</div>
    <div id="debug-info"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const BLOCK_SIZE = 0.08;
        const PINCH_THRESHOLD = 0.035;
        const STABLE_PINCH_FRAMES = 6;

        let scene, camera, renderer;
        let xrSession = null;
        let xrReferenceSpace = null;
        let blocks = [];
        let handVisuals = [];
        let pinchWasDetected = false;
        let stablePinchCount = 0;

        // ============================================
        // THREE.JS SETUP
        // ============================================
        function setupThreeJS() {
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(
                70, window.innerWidth / window.innerHeight, 0.01, 50
            );

            renderer = new THREE.WebGLRenderer({
                antialias: true,
                alpha: true,
                powerPreference: 'high-performance',
            });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            renderer.setClearColor(0x000000, 0);
            document.body.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambient);
        }

        // ============================================
        // WIREFRAME BLOCK
        // ============================================
        function createBlock(position) {
            const group = new THREE.Group();
            const half = BLOCK_SIZE / 2;

            const geo = new THREE.BoxGeometry(BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
            
            const fillMat = new THREE.MeshBasicMaterial({
                color: 0x00ff41,
                transparent: true,
                opacity: 0.06,
                depthWrite: false,
            });
            group.add(new THREE.Mesh(geo, fillMat));

            const edgeGeo = new THREE.EdgesGeometry(geo);
            const edgeMat = new THREE.LineBasicMaterial({
                color: 0x00ff41,
                transparent: true,
                opacity: 0.9,
            });
            group.add(new THREE.LineSegments(edgeGeo, edgeMat));

            const corners = [
                [-half, -half, -half], [half, -half, -half],
                [-half, half, -half], [half, half, -half],
                [-half, -half, half], [half, -half, half],
                [-half, half, half], [half, half, half],
            ];
            const dotGeo = new THREE.SphereGeometry(0.006, 6, 6);
            const dotMat = new THREE.MeshBasicMaterial({ color: 0x00ff41 });
            corners.forEach(c => {
                const dot = new THREE.Mesh(dotGeo, dotMat);
                dot.position.set(...c);
                group.add(dot);
            });

            group.position.copy(position);
            group.userData = {
                isBlock: true,
                blockId: Date.now() + Math.random(),
                halfSize: half,
            };

            return group;
        }

        function findNearestFace(point) {
            let bestBlock = null;
            let bestNormal = null;
            let bestDist = 0.07;

            const normals = [
                new THREE.Vector3(0, 1, 0),
                new THREE.Vector3(0, -1, 0),
                new THREE.Vector3(1, 0, 0),
                new THREE.Vector3(-1, 0, 0),
                new THREE.Vector3(0, 0, 1),
                new THREE.Vector3(0, 0, -1),
            ];

            for (const block of blocks) {
                const half = block.userData.halfSize;
                const bp = block.position;

                const offsets = [
                    new THREE.Vector3(0, half, 0),
                    new THREE.Vector3(0, -half, 0),
                    new THREE.Vector3(half, 0, 0),
                    new THREE.Vector3(-half, 0, 0),
                    new THREE.Vector3(0, 0, half),
                    new THREE.Vector3(0, 0, -half),
                ];

                for (let i = 0; i < 6; i++) {
                    const fc = bp.clone().add(offsets[i]);
                    const dist = point.distanceTo(fc);
                    if (dist < bestDist) {
                        bestDist = dist;
                        bestBlock = block;
                        bestNormal = normals[i];
                    }
                }
            }

            return { block: bestBlock, normal: bestNormal };
        }

        function placeBlock(position) {
            const block = createBlock(position);
            scene.add(block);
            blocks.push(block);
            updateStatus();
        }

        function extrudeBlock(sourceBlock, normal) {
            const offset = normal.clone().multiplyScalar(BLOCK_SIZE * 1.05);
            const newPos = sourceBlock.position.clone().add(offset);
            const block = createBlock(newPos);
            scene.add(block);
            blocks.push(block);

            block.scale.set(0.01, 0.01, 0.01);
            const start = performance.now();
            function anim(time) {
                const t = Math.min((time - start) / 250, 1);
                block.scale.setScalar(1 - Math.pow(1 - t, 3));
                if (t < 1) requestAnimationFrame(anim);
            }
            requestAnimationFrame(anim);
            updateStatus();
        }

        function updateStatus() {
            document.getElementById('status-line').textContent = `BLOCKS: ${blocks.length}`;
        }

        // ============================================
        // HAND JOINT VISUALIZATION
        // ============================================
        function createHandVisuals() {
            const group = new THREE.Group();
            const joints = [];
            
            const smallGeo = new THREE.SphereGeometry(0.005, 8, 8);
            const smallMat = new THREE.MeshBasicMaterial({
                color: 0x00ff41,
                transparent: true,
                opacity: 0.6,
            });

            for (let i = 0; i < 25; i++) {
                const sphere = new THREE.Mesh(smallGeo, smallMat.clone());
                sphere.visible = false;
                group.add(sphere);
                joints.push(sphere);
            }

            // Extra visible indicators for thumb tip and index tip
            const tipGeo = new THREE.SphereGeometry(0.012, 12, 12);
            const tipMat = new THREE.MeshBasicMaterial({ color: 0x00ff41 });
            
            const thumbIndicator = new THREE.Mesh(tipGeo, tipMat);
            thumbIndicator.visible = false;
            thumbIndicator.name = 'thumbIndicator';
            group.add(thumbIndicator);
            
            const indexIndicator = new THREE.Mesh(tipGeo, tipMat);
            indexIndicator.visible = false;
            indexIndicator.name = 'indexIndicator';
            group.add(indexIndicator);

            group.userData = { joints, thumbIndicator, indexIndicator };
            return group;
        }

        function updateHandVisuals(group, jointPositions) {
            const { joints, thumbIndicator, indexIndicator } = group.userData;

            if (!jointPositions) {
                joints.forEach(j => j.visible = false);
                thumbIndicator.visible = false;
                indexIndicator.visible = false;
                return { thumbTip: null, indexTip: null };
            }

            for (let i = 0; i < joints.length; i++) {
                if (jointPositions[i]) {
                    joints[i].position.copy(jointPositions[i]);
                    joints[i].visible = true;
                } else {
                    joints[i].visible = false;
                }
            }

            const thumbTip = jointPositions[4] || null;
            const indexTip = jointPositions[8] || null;

            if (thumbTip) {
                thumbIndicator.position.copy(thumbTip);
                thumbIndicator.visible = true;
                joints[4].scale.setScalar(2.0);
                joints[4].material.opacity = 1.0;
            } else {
                thumbIndicator.visible = false;
            }

            if (indexTip) {
                indexIndicator.position.copy(indexTip);
                indexIndicator.visible = true;
                joints[8].scale.setScalar(2.0);
                joints[8].material.opacity = 1.0;
            } else {
                indexIndicator.visible = false;
            }

            return { thumbTip, indexTip };
        }

        // ============================================
        // GET HAND JOINTS FROM XRFRAME
        // ============================================
        function getHandJoints(hand, frame, referenceSpace) {
            if (!hand || !frame || !referenceSpace) return null;
            
            const joints = [];
            for (let i = 0; i < 25; i++) {
                try {
                    const joint = hand.getJoint(i);
                    if (joint) {
                        const pose = frame.getJointPose(joint, referenceSpace);
                        if (pose && pose.transform) {
                            const p = pose.transform.position;
                            joints.push(new THREE.Vector3(p.x, p.y, p.z));
                        } else {
                            joints.push(null);
                        }
                    } else {
                        joints.push(null);
                    }
                } catch (e) {
                    joints.push(null);
                }
            }
            return joints;
        }

        // ============================================
        // XR FRAME LOOP
        // ============================================
        function onXRFrame(time, frame) {
            if (!frame || !xrSession || !xrReferenceSpace) return;

            // Ensure hand visuals exist
            while (handVisuals.length < 2) {
                const vis = createHandVisuals();
                handVisuals.push(vis);
                scene.add(vis);
            }

            const inputSources = xrSession.inputSources;
            let rightHand = null;
            let leftHand = null;

            // Identify hands from input sources
            for (const source of inputSources) {
                if (source.hand) {
                    if (source.handedness === 'right') rightHand = source.hand;
                    if (source.handedness === 'left') leftHand = source.hand;
                }
            }

            const primaryHand = rightHand || leftHand;
            const secondaryHand = rightHand && leftHand ? leftHand : null;

            const debugEl = document.getElementById('debug-info');
            let debugText = '';

            // Process primary hand
            let thumbTip = null;
            let indexTip = null;

            if (primaryHand) {
                const joints = getHandJoints(primaryHand, frame, xrReferenceSpace);
                const result = updateHandVisuals(handVisuals[0], joints);
                thumbTip = result.thumbTip;
                indexTip = result.indexTip;
                
                if (thumbTip && indexTip) {
                    const dist = thumbTip.distanceTo(indexTip);
                    debugText = `THUMB-INDEX: ${(dist * 100).toFixed(1)}cm`;
                }
            } else {
                updateHandVisuals(handVisuals[0], null);
                debugText = 'NO HAND DETECTED';
            }

            // Process secondary hand
            if (secondaryHand) {
                const joints = getHandJoints(secondaryHand, frame, xrReferenceSpace);
                updateHandVisuals(handVisuals[1], joints);
            } else {
                updateHandVisuals(handVisuals[1], null);
            }

            debugEl.textContent = debugText;

            // Pinch detection
            let isPinching = false;
            if (thumbTip && indexTip) {
                const pinchDist = thumbTip.distanceTo(indexTip);
                isPinching = pinchDist < PINCH_THRESHOLD;
            }

            // Stable pinch debounce
            if (isPinching) {
                stablePinchCount++;
            } else {
                stablePinchCount = 0;
            }

            const stablePinch = stablePinchCount >= STABLE_PINCH_FRAMES;
            const pinchTriggered = stablePinch && !pinchWasDetected;
            pinchWasDetected = stablePinch;

            // Status display
            const statusEl = document.getElementById('status-line');
            if (!primaryHand) {
                statusEl.textContent = 'SHOW HANDS TO CAMERA';
                statusEl.classList.add('scanning-text');
            } else if (isPinching) {
                statusEl.textContent = 'PINCHING...';
                statusEl.classList.remove('scanning-text');
            } else {
                statusEl.textContent = `BLOCKS: ${blocks.length} | READY`;
                statusEl.classList.remove('scanning-text');
            }

            // Handle pinch action
            if (pinchTriggered && indexTip) {
                const faceResult = findNearestFace(indexTip);
                if (faceResult.block && faceResult.normal) {
                    extrudeBlock(faceResult.block, faceResult.normal);
                } else {
                    placeBlock(indexTip.clone());
                }
            }

            renderer.render(scene, camera);
        }

        // ============================================
        // START AR SESSION
        // ============================================
        async function startARSession() {
            if (!navigator.xr) {
                alert('WebXR not supported. Use Chrome on Android with ARCore.');
                return false;
            }

            let supported = false;
            try {
                supported = await navigator.xr.isSessionSupported('immersive-ar');
            } catch (e) {
                alert('Error: ' + e.message);
                return false;
            }

            if (!supported) {
                alert('Immersive AR not available on this device.');
                return false;
            }

            const sessionInit = {
                requiredFeatures: ['local'],
                optionalFeatures: ['hand-tracking'],
            };

            try {
                xrSession = await navigator.xr.requestSession('immersive-ar', sessionInit);
            } catch (e) {
                alert('Failed to start AR session: ' + e.message);
                return false;
            }

            // Check if hand tracking actually activated
            const features = Array.from(xrSession.enabledFeatures || []);
            const hasHands = features.includes('hand-tracking');
            
            if (!hasHands) {
                console.warn('Hand tracking not enabled. Device may not support it.');
                document.getElementById('debug-info').textContent = 
                    'HAND TRACKING UNAVAILABLE ON THIS DEVICE';
            }

            xrReferenceSpace = await xrSession.requestReferenceSpace('local');
            await renderer.xr.setSession(xrSession);

            xrSession.addEventListener('end', () => {
                xrSession = null;
                xrReferenceSpace = null;
                renderer.setAnimationLoop(null);
                
                // Clean up scene
                blocks.forEach(b => scene.remove(b));
                blocks = [];
                handVisuals.forEach(v => scene.remove(v));
                handVisuals = [];
                
                document.getElementById('status-line').textContent = 'SESSION ENDED';
                document.getElementById('debug-info').textContent = '';
                document.getElementById('start-overlay').style.display = 'flex';
                document.getElementById('btn-start').disabled = false;
                document.getElementById('btn-start').textContent = 'ENTER AR';
            });

            renderer.setAnimationLoop(onXRFrame);

            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('status-line').textContent = 'SHOW HANDS TO CAMERA';
            document.getElementById('status-line').classList.add('scanning-text');
            
            return true;
        }

        // ============================================
        // INIT
        // ============================================
        function init() {
            setupThreeJS();

            document.getElementById('btn-start').addEventListener('click', async () => {
                const btn = document.getElementById('btn-start');
                btn.disabled = true;
                btn.textContent = 'STARTING...';
                
                const success = await startARSession();
                if (!success) {
                    btn.disabled = false;
                    btn.textContent = 'ENTER AR';
                }
            });

            window.addEventListener('resize', () => {
                if (renderer && !xrSession) {
                    renderer.setSize(window.innerWidth, window.innerHeight);
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                }
            });
        }

        init();
    </script>
</body>
</html>
