<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Block Builder</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --neon-green-dim: rgba(0, 255, 65, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            position: fixed;
        }

        #status-line {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: var(--neon-green);
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
            text-align: center;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }

        .scanning-text {
            animation: scanPulse 2s infinite;
        }

        @keyframes scanPulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 1;
            }
        }

        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #start-box {
            border: 2px solid var(--neon-green);
            padding: 48px 32px;
            text-align: center;
            color: var(--neon-green);
            background: rgba(0, 0, 0, 0.95);
            max-width: 360px;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.15);
        }

        #start-box h2 {
            font-size: 16px;
            letter-spacing: 5px;
            margin-bottom: 20px;
            font-weight: normal;
        }

        #start-box p {
            font-size: 11px;
            opacity: 0.6;
            margin-bottom: 28px;
            line-height: 1.7;
            letter-spacing: 1px;
        }

        #btn-start {
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 14px 40px;
            font-family: inherit;
            font-size: 13px;
            letter-spacing: 4px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        #btn-start:active {
            background: var(--neon-green);
            color: #000;
        }

        #btn-start:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        #debug-info {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            color: var(--neon-green);
            font-family: 'Courier New', monospace;
            font-size: 9px;
            letter-spacing: 1px;
            opacity: 0.7;
            text-align: center;
            pointer-events: none;
        }

        /* Finger scanning overlay */
        #scan-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #scan-overlay.active {
            display: flex;
        }

        #scan-container {
            position: relative;
            width: 280px;
            height: 280px;
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.2), inset 0 0 40px rgba(0, 255, 65, 0.05);
            overflow: hidden;
        }

        #scan-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #scan-canvas {
            display: none;
        }

        /* Scanning guide box */
        .scan-guide {
            position: absolute;
            border: 2px dashed var(--neon-green);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.3);
            pointer-events: none;
            animation: guidePulse 2s infinite;
        }

        @keyframes guidePulse {
            0%,
            100% {
                border-color: var(--neon-green);
                box-shadow: 0 0 15px rgba(0, 255, 65, 0.3);
            }
            50% {
                border-color: rgba(0, 255, 65, 0.4);
                box-shadow: 0 0 30px rgba(0, 255, 65, 0.6);
            }
        }

        /* Scanning corners */
        .scan-corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: var(--neon-green);
            border-style: solid;
            pointer-events: none;
        }
        .scan-corner.tl {
            top: -1px;
            left: -1px;
            border-width: 3px 0 0 3px;
        }
        .scan-corner.tr {
            top: -1px;
            right: -1px;
            border-width: 3px 3px 0 0;
        }
        .scan-corner.bl {
            bottom: -1px;
            left: -1px;
            border-width: 0 0 3px 3px;
        }
        .scan-corner.br {
            bottom: -1px;
            right: -1px;
            border-width: 0 3px 3px 0;
        }

        /* Scanning text */
        #scan-instruction {
            color: var(--neon-green);
            font-family: 'Courier New', monospace;
            font-size: 14px;
            letter-spacing: 3px;
            margin-top: 24px;
            text-align: center;
            text-transform: uppercase;
        }

        #scan-progress {
            color: var(--neon-green);
            font-family: 'Courier New', monospace;
            font-size: 11px;
            letter-spacing: 2px;
            margin-top: 8px;
            opacity: 0.6;
        }

        /* Progress dots */
        #progress-dots {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .progress-dot {
            width: 12px;
            height: 12px;
            border: 2px solid var(--neon-green);
            border-radius: 50%;
            transition: all 0.3s;
        }

        .progress-dot.filled {
            background: var(--neon-green);
            box-shadow: 0 0 15px var(--neon-green);
        }

        .progress-dot.current {
            animation: dotPulse 1s infinite;
        }

        @keyframes dotPulse {
            0%,
            100% {
                box-shadow: 0 0 5px var(--neon-green);
            }
            50% {
                box-shadow: 0 0 20px var(--neon-green);
            }
        }

        /* Scanning line animation */
        .scan-line {
            position: absolute;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--neon-green);
            box-shadow: 0 0 8px var(--neon-green);
            pointer-events: none;
            animation: scanLine 2s linear infinite;
        }

        @keyframes scanLine {
            0% {
                top: 0;
            }
            100% {
                top: 100%;
            }
        }

        #scan-retry {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 10px 28px;
            font-family: inherit;
            font-size: 11px;
            letter-spacing: 3px;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 20px;
            transition: all 0.3s;
            display: none;
        }

        #scan-retry:active {
            background: var(--neon-green);
            color: #000;
        }
    </style>
</head>
<body>

    <!-- Main start overlay -->
    <div id="start-overlay">
        <div id="start-box">
            <h2>AR BLOCK BUILDER</h2>
            <p>FINGER CALIBRATION REQUIRED<br>
               SCAN THUMB THEN INDEX FINGER<br>
               PINCH TO PLACE OR EXTRUDE</p>
            <button id="btn-start">START CALIBRATION</button>
        </div>
    </div>

    <!-- Finger scanning overlay -->
    <div id="scan-overlay">
        <div id="scan-container">
            <video id="scan-video" autoplay playsinline muted></video>
            <canvas id="scan-canvas"></canvas>
            <div class="scan-guide" id="scan-guide"></div>
            <div class="scan-line"></div>
            <div class="scan-corner tl"></div>
            <div class="scan-corner tr"></div>
            <div class="scan-corner bl"></div>
            <div class="scan-corner br"></div>
        </div>
        <div id="scan-instruction">PLACE THUMB IN BOX</div>
        <div id="scan-progress">SCAN 1 OF 2</div>
        <div id="progress-dots">
            <div class="progress-dot current" id="dot-1"></div>
            <div class="progress-dot" id="dot-2"></div>
        </div>
        <button id="scan-retry">RETRY</button>
    </div>

    <div id="status-line" class="scanning-text">READY</div>
    <div id="debug-info"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ============================================
        // CONSTANTS
        // ============================================
        const BLOCK_SIZE = 0.08;
        const PINCH_THRESHOLD = 0.035;
        const STABLE_PINCH_FRAMES = 6;
        const SCAN_FRAME_SIZE = 280;
        const SCAN_GUIDE_SIZE = 120;
        const SCAN_CONFIDENCE_THRESHOLD = 0.7;
        const SCAN_STABLE_FRAMES = 30;

        // ============================================
        // STATE
        // ============================================
        let scene, camera, renderer;
        let xrSession = null;
        let xrReferenceSpace = null;
        let blocks = [];
        let handVisuals = [];
        let pinchWasDetected = false;
        let stablePinchCount = 0;

        // Finger calibration data
        let thumbColorProfile = null;
        let indexColorProfile = null;
        let calibratedFingers = false;

        // Scanning state
        let scanStream = null;
        let scanVideo = null;
        let scanCanvas = null;
        let scanCtx = null;
        let currentScanStep = 0; // 0 = thumb, 1 = index, 2 = done
        let scanStableCount = 0;
        let scanAnimationId = null;

        // ============================================
        // THREE.JS SETUP
        // ============================================
        function setupThreeJS() {
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(
                70, window.innerWidth / window.innerHeight, 0.01, 50
            );

            renderer = new THREE.WebGLRenderer({
                antialias: true,
                alpha: true,
                powerPreference: 'high-performance',
            });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            renderer.setClearColor(0x000000, 0);
            document.body.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambient);
        }

        // ============================================
        // WIREFRAME BLOCK
        // ============================================
        function createBlock(position) {
            const group = new THREE.Group();
            const half = BLOCK_SIZE / 2;

            const geo = new THREE.BoxGeometry(BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);

            const fillMat = new THREE.MeshBasicMaterial({
                color: 0x00ff41,
                transparent: true,
                opacity: 0.06,
                depthWrite: false,
            });
            group.add(new THREE.Mesh(geo, fillMat));

            const edgeGeo = new THREE.EdgesGeometry(geo);
            const edgeMat = new THREE.LineBasicMaterial({
                color: 0x00ff41,
                transparent: true,
                opacity: 0.9,
            });
            group.add(new THREE.LineSegments(edgeGeo, edgeMat));

            const corners = [
                [-half, -half, -half],
                [half, -half, -half],
                [-half, half, -half],
                [half, half, -half],
                [-half, -half, half],
                [half, -half, half],
                [-half, half, half],
                [half, half, half],
            ];
            const dotGeo = new THREE.SphereGeometry(0.006, 6, 6);
            const dotMat = new THREE.MeshBasicMaterial({ color: 0x00ff41 });
            corners.forEach(c => {
                const dot = new THREE.Mesh(dotGeo, dotMat);
                dot.position.set(...c);
                group.add(dot);
            });

            group.position.copy(position);
            group.userData = {
                isBlock: true,
                blockId: Date.now() + Math.random(),
                halfSize: half,
            };

            return group;
        }

        function findNearestFace(point) {
            let bestBlock = null;
            let bestNormal = null;
            let bestDist = 0.07;

            const normals = [
                new THREE.Vector3(0, 1, 0),
                new THREE.Vector3(0, -1, 0),
                new THREE.Vector3(1, 0, 0),
                new THREE.Vector3(-1, 0, 0),
                new THREE.Vector3(0, 0, 1),
                new THREE.Vector3(0, 0, -1),
            ];

            for (const block of blocks) {
                const half = block.userData.halfSize;
                const bp = block.position;

                const offsets = [
                    new THREE.Vector3(0, half, 0),
                    new THREE.Vector3(0, -half, 0),
                    new THREE.Vector3(half, 0, 0),
                    new THREE.Vector3(-half, 0, 0),
                    new THREE.Vector3(0, 0, half),
                    new THREE.Vector3(0, 0, -half),
                ];

                for (let i = 0; i < 6; i++) {
                    const fc = bp.clone().add(offsets[i]);
                    const dist = point.distanceTo(fc);
                    if (dist < bestDist) {
                        bestDist = dist;
                        bestBlock = block;
                        bestNormal = normals[i];
                    }
                }
            }

            return { block: bestBlock, normal: bestNormal };
        }

        function placeBlock(position) {
            const block = createBlock(position);
            scene.add(block);
            blocks.push(block);
            updateStatus();
        }

        function extrudeBlock(sourceBlock, normal) {
            const offset = normal.clone().multiplyScalar(BLOCK_SIZE * 1.05);
            const newPos = sourceBlock.position.clone().add(offset);
            const block = createBlock(newPos);
            scene.add(block);
            blocks.push(block);

            block.scale.set(0.01, 0.01, 0.01);
            const start = performance.now();

            function anim(time) {
                const t = Math.min((time - start) / 250, 1);
                block.scale.setScalar(1 - Math.pow(1 - t, 3));
                if (t < 1) requestAnimationFrame(anim);
            }
            requestAnimationFrame(anim);
            updateStatus();
        }

        function updateStatus() {
            document.getElementById('status-line').textContent = `BLOCKS: ${blocks.length}`;
        }

        // ============================================
        // HAND JOINT VISUALIZATION
        // ============================================
        function createHandVisuals() {
            const group = new THREE.Group();
            const joints = [];

            const smallGeo = new THREE.SphereGeometry(0.005, 8, 8);
            const smallMat = new THREE.MeshBasicMaterial({
                color: 0x00ff41,
                transparent: true,
                opacity: 0.6,
            });

            for (let i = 0; i < 25; i++) {
                const sphere = new THREE.Mesh(smallGeo, smallMat.clone());
                sphere.visible = false;
                group.add(sphere);
                joints.push(sphere);
            }

            const tipGeo = new THREE.SphereGeometry(0.012, 12, 12);
            const tipMat = new THREE.MeshBasicMaterial({ color: 0x00ff41 });

            const thumbIndicator = new THREE.Mesh(tipGeo, tipMat);
            thumbIndicator.visible = false;
            thumbIndicator.name = 'thumbIndicator';
            group.add(thumbIndicator);

            const indexIndicator = new THREE.Mesh(tipGeo, tipMat);
            indexIndicator.visible = false;
            indexIndicator.name = 'indexIndicator';
            group.add(indexIndicator);

            group.userData = { joints, thumbIndicator, indexIndicator };
            return group;
        }

        function updateHandVisuals(group, jointPositions) {
            const { joints, thumbIndicator, indexIndicator } = group.userData;

            if (!jointPositions) {
                joints.forEach(j => j.visible = false);
                thumbIndicator.visible = false;
                indexIndicator.visible = false;
                return { thumbTip: null, indexTip: null };
            }

            for (let i = 0; i < joints.length; i++) {
                if (jointPositions[i]) {
                    joints[i].position.copy(jointPositions[i]);
                    joints[i].visible = true;
                } else {
                    joints[i].visible = false;
                }
            }

            const thumbTip = jointPositions[4] || null;
            const indexTip = jointPositions[8] || null;

            if (thumbTip) {
                thumbIndicator.position.copy(thumbTip);
                thumbIndicator.visible = true;
                joints[4].scale.setScalar(2.0);
                joints[4].material.opacity = 1.0;
            } else {
                thumbIndicator.visible = false;
            }

            if (indexTip) {
                indexIndicator.position.copy(indexTip);
                indexIndicator.visible = true;
                joints[8].scale.setScalar(2.0);
                joints[8].material.opacity = 1.0;
            } else {
                indexIndicator.visible = false;
            }

            return { thumbTip, indexTip };
        }

        function getHandJoints(hand, frame, referenceSpace) {
            if (!hand || !frame || !referenceSpace) return null;

            const joints = [];
            for (let i = 0; i < 25; i++) {
                try {
                    const joint = hand.getJoint(i);
                    if (joint) {
                        const pose = frame.getJointPose(joint, referenceSpace);
                        if (pose && pose.transform) {
                            const p = pose.transform.position;
                            joints.push(new THREE.Vector3(p.x, p.y, p.z));
                        } else {
                            joints.push(null);
                        }
                    } else {
                        joints.push(null);
                    }
                } catch (e) {
                    joints.push(null);
                }
            }
            return joints;
        }

        // ============================================
        // FINGER SCANNING / CALIBRATION
        // ============================================
        async function startScanning() {
            const overlay = document.getElementById('scan-overlay');
            const video = document.getElementById('scan-video');
            const canvas = document.getElementById('scan-canvas');
            const guide = document.getElementById('scan-guide');
            const instruction = document.getElementById('scan-instruction');
            const progress = document.getElementById('scan-progress');
            const dot1 = document.getElementById('dot-1');
            const dot2 = document.getElementById('dot-2');
            const retryBtn = document.getElementById('scan-retry');

            overlay.classList.add('active');
            currentScanStep = 0;
            scanStableCount = 0;
            thumbColorProfile = null;
            indexColorProfile = null;
            calibratedFingers = false;

            // Position guide box in center
            const guideSize = SCAN_GUIDE_SIZE;
            const guideLeft = (SCAN_FRAME_SIZE - guideSize) / 2;
            const guideTop = (SCAN_FRAME_SIZE - guideSize) / 2;
            guide.style.width = guideSize + 'px';
            guide.style.height = guideSize + 'px';
            guide.style.left = guideLeft + 'px';
            guide.style.top = guideTop + 'px';

            // Reset UI
            instruction.textContent = 'PLACE THUMB IN BOX';
            progress.textContent = 'SCAN 1 OF 2';
            dot1.classList.add('current');
            dot1.classList.remove('filled');
            dot2.classList.remove('current', 'filled');
            retryBtn.style.display = 'none';

            // Setup canvas
            canvas.width = SCAN_FRAME_SIZE;
            canvas.height = SCAN_FRAME_SIZE;
            scanCanvas = canvas;
            scanCtx = canvas.getContext('2d', { willReadFrequently: true });

            // Get camera
            try {
                scanStream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 640 },
                        height: { ideal: 640 },
                    }
                });
                video.srcObject = scanStream;
                video.playsInline = true;
                await video.play();
                scanVideo = video;

                // Start scan loop
                scanAnimationId = requestAnimationFrame(scanLoop);
            } catch (e) {
                instruction.textContent = 'CAMERA ACCESS DENIED';
                retryBtn.style.display = 'block';
            }
        }

        function scanLoop() {
            if (!scanVideo || !scanCtx || currentScanStep >= 2) {
                // Scanning complete
                if (currentScanStep >= 2) {
                    finishScanning();
                }
                return;
            }

            // Draw video to canvas
            scanCtx.drawImage(scanVideo, 0, 0, SCAN_FRAME_SIZE, SCAN_FRAME_SIZE);

            // Get guide box region
            const guideSize = SCAN_GUIDE_SIZE;
            const guideLeft = (SCAN_FRAME_SIZE - guideSize) / 2;
            const guideTop = (SCAN_FRAME_SIZE - guideSize) / 2;

            const imageData = scanCtx.getImageData(guideLeft, guideTop, guideSize, guideSize);
            const colorProfile = extractColorProfile(imageData);

            // Check if a finger is present in the box
            const hasFinger = detectFingerPresence(imageData);

            const instruction = document.getElementById('scan-instruction');
            const retryBtn = document.getElementById('scan-retry');

            if (hasFinger) {
                scanStableCount++;

                // Update instruction with progress
                const progressPercent = Math.min(100, Math.round((scanStableCount / SCAN_STABLE_FRAMES) * 100));
                instruction.textContent = `HOLD STEADY... ${progressPercent}%`;

                if (scanStableCount >= SCAN_STABLE_FRAMES) {
                    // Capture the color profile
                    if (currentScanStep === 0) {
                        thumbColorProfile = colorProfile;
                        currentScanStep = 1;
                        scanStableCount = 0;

                        // Update UI
                        instruction.textContent = 'PLACE INDEX FINGER IN BOX';
                        document.getElementById('scan-progress').textContent = 'SCAN 2 OF 2';
                        document.getElementById('dot-1').classList.remove('current');
                        document.getElementById('dot-1').classList.add('filled');
                        document.getElementById('dot-2').classList.add('current');

                        // Brief pause to let user reposition
                        setTimeout(() => {
                            instruction.textContent = 'PLACE INDEX FINGER IN BOX';
                        }, 500);
                    } else if (currentScanStep === 1) {
                        indexColorProfile = colorProfile;
                        currentScanStep = 2;
                        calibratedFingers = true;

                        // Update UI
                        instruction.textContent = 'CALIBRATION COMPLETE';
                        document.getElementById('scan-progress').textContent = 'READY';
                        document.getElementById('dot-2').classList.remove('current');
                        document.getElementById('dot-2').classList.add('filled');

                        // Finish after brief display
                        setTimeout(() => {
                            finishScanning();
                        }, 1000);
                        return;
                    }
                }
            } else {
                if (scanStableCount > 0) {
                    scanStableCount = Math.max(0, scanStableCount - 2);
                }
                if (currentScanStep === 0) {
                    instruction.textContent = 'PLACE THUMB IN BOX';
                } else {
                    instruction.textContent = 'PLACE INDEX FINGER IN BOX';
                }
            }

            retryBtn.style.display = 'none';
            scanAnimationId = requestAnimationFrame(scanLoop);
        }

        function extractColorProfile(imageData) {
            const pixels = imageData.data;
            let totalR = 0,
                totalG = 0,
                totalB = 0;
            let count = 0;

            // Sample pixels (every 4th pixel for performance)
            for (let i = 0; i < pixels.length; i += 16) {
                totalR += pixels[i];
                totalG += pixels[i + 1];
                totalB += pixels[i + 2];
                count++;
            }

            if (count === 0) return { r: 0, g: 0, b: 0 };

            return {
                r: Math.round(totalR / count),
                g: Math.round(totalG / count),
                b: Math.round(totalB / count),
            };
        }

        function detectFingerPresence(imageData) {
            const pixels = imageData.data;
            let skinPixels = 0;
            let totalPixels = 0;

            // Simple skin detection based on RGB ranges
            for (let i = 0; i < pixels.length; i += 16) {
                const r = pixels[i];
                const g = pixels[i + 1];
                const b = pixels[i + 2];

                // Broader skin tone detection for various lighting
                if (r > 60 && g > 30 && b > 15 &&
                    r > g && r > b &&
                    Math.abs(r - g) > 10 &&
                    r - b > 10) {
                    skinPixels++;
                }
                totalPixels++;
            }

            const skinRatio = skinPixels / totalPixels;
            return skinRatio > 0.25; // At least 25% skin pixels in the box
        }

        function finishScanning() {
            // Stop scan loop
            if (scanAnimationId) {
                cancelAnimationFrame(scanAnimationId);
                scanAnimationId = null;
            }

            // Stop camera
            if (scanStream) {
                scanStream.getTracks().forEach(track => track.stop());
                scanStream = null;
            }
            if (scanVideo) {
                scanVideo.srcObject = null;
                scanVideo = null;
            }

            // Hide scan overlay
            document.getElementById('scan-overlay').classList.remove('active');

            if (calibratedFingers) {
                // Proceed to AR
                document.getElementById('status-line').textContent = 'CALIBRATED - ENTERING AR...';
                document.getElementById('start-overlay').style.display = 'none';
                startARSession();
            } else {
                // Go back to start
                document.getElementById('start-overlay').style.display = 'flex';
                document.getElementById('btn-start').disabled = false;
                document.getElementById('btn-start').textContent = 'START CALIBRATION';
                document.getElementById('status-line').textContent = 'CALIBRATION FAILED';
            }
        }

        function retryScan() {
            // Stop current scan
            if (scanAnimationId) {
                cancelAnimationFrame(scanAnimationId);
                scanAnimationId = null;
            }
            if (scanStream) {
                scanStream.getTracks().forEach(track => track.stop());
                scanStream = null;
            }
            if (scanVideo) {
                scanVideo.srcObject = null;
                scanVideo = null;
            }

            // Restart
            startScanning();
        }

        // ============================================
        // MATCH FINGER COLOR (for AR tracking)
        // ============================================
        function matchFingerColor(r, g, b, profile) {
            if (!profile) return false;
            const dr = r - profile.r;
            const dg = g - profile.g;
            const db = b - profile.b;
            const distance = Math.sqrt(dr * dr + dg * dg + db * db);
            return distance < 60; // Tolerance for lighting changes
        }

        // ============================================
        // XR FRAME LOOP
        // ============================================
        function onXRFrame(time, frame) {
            if (!frame || !xrSession || !xrReferenceSpace) return;

            while (handVisuals.length < 2) {
                const vis = createHandVisuals();
                handVisuals.push(vis);
                scene.add(vis);
            }

            const inputSources = xrSession.inputSources;
            let rightHand = null;
            let leftHand = null;

            for (const source of inputSources) {
                if (source.hand) {
                    if (source.handedness === 'right') rightHand = source.hand;
                    if (source.handedness === 'left') leftHand = source.hand;
                }
            }

            const primaryHand = rightHand || leftHand;
            const secondaryHand = rightHand && leftHand ? leftHand : null;

            const debugEl = document.getElementById('debug-info');
            let debugText = calibratedFingers ? 'CALIBRATED | ' : '';

            let thumbTip = null;
            let indexTip = null;

            if (primaryHand) {
                const joints = getHandJoints(primaryHand, frame, xrReferenceSpace);
                const result = updateHandVisuals(handVisuals[0], joints);
                thumbTip = result.thumbTip;
                indexTip = result.indexTip;

                if (thumbTip && indexTip) {
                    const dist = thumbTip.distanceTo(indexTip);
                    debugText += `DIST: ${(dist * 100).toFixed(1)}cm`;
                }
            } else {
                updateHandVisuals(handVisuals[0], null);
                debugText += 'NO HAND';
            }

            if (secondaryHand) {
                const joints = getHandJoints(secondaryHand, frame, xrReferenceSpace);
                updateHandVisuals(handVisuals[1], joints);
            } else {
                updateHandVisuals(handVisuals[1], null);
            }

            debugEl.textContent = debugText;

            let isPinching = false;
            if (thumbTip && indexTip) {
                const pinchDist = thumbTip.distanceTo(indexTip);
                isPinching = pinchDist < PINCH_THRESHOLD;
            }

            if (isPinching) {
                stablePinchCount++;
            } else {
                stablePinchCount = 0;
            }

            const stablePinch = stablePinchCount >= STABLE_PINCH_FRAMES;
            const pinchTriggered = stablePinch && !pinchWasDetected;
            pinchWasDetected = stablePinch;

            const statusEl = document.getElementById('status-line');
            if (!primaryHand) {
                statusEl.textContent = 'SHOW HANDS TO CAMERA';
                statusEl.classList.add('scanning-text');
            } else if (isPinching) {
                statusEl.textContent = 'PINCHING...';
                statusEl.classList.remove('scanning-text');
            } else {
                statusEl.textContent = `BLOCKS: ${blocks.length} | READY`;
                statusEl.classList.remove('scanning-text');
            }

            if (pinchTriggered && indexTip) {
                const faceResult = findNearestFace(indexTip);
                if (faceResult.block && faceResult.normal) {
                    extrudeBlock(faceResult.block, faceResult.normal);
                } else {
                    placeBlock(indexTip.clone());
                }
            }

            renderer.render(scene, camera);
        }

        // ============================================
        // START AR SESSION
        // ============================================
        async function startARSession() {
            if (!navigator.xr) {
                alert('WebXR not supported. Use Chrome on Android with ARCore.');
                return false;
            }

            let supported = false;
            try {
                supported = await navigator.xr.isSessionSupported('immersive-ar');
            } catch (e) {
                alert('Error: ' + e.message);
                return false;
            }

            if (!supported) {
                alert('Immersive AR not available on this device.');
                return false;
            }

            const sessionInit = {
                requiredFeatures: ['local'],
                optionalFeatures: ['hand-tracking'],
            };

            try {
                xrSession = await navigator.xr.requestSession('immersive-ar', sessionInit);
            } catch (e) {
                alert('Failed to start AR session: ' + e.message);
                return false;
            }

            const features = Array.from(xrSession.enabledFeatures || []);
            const hasHands = features.includes('hand-tracking');

            if (!hasHands) {
                document.getElementById('debug-info').textContent =
                    'HAND TRACKING UNAVAILABLE';
            }

            xrReferenceSpace = await xrSession.requestReferenceSpace('local');
            await renderer.xr.setSession(xrSession);

            xrSession.addEventListener('end', () => {
                xrSession = null;
                xrReferenceSpace = null;
                renderer.setAnimationLoop(null);

                blocks.forEach(b => scene.remove(b));
                blocks = [];
                handVisuals.forEach(v => scene.remove(v));
                handVisuals = [];

                document.getElementById('status-line').textContent = 'SESSION ENDED';
                document.getElementById('debug-info').textContent = '';
                document.getElementById('start-overlay').style.display = 'flex';
                document.getElementById('btn-start').disabled = false;
                document.getElementById('btn-start').textContent = 'START CALIBRATION';
                calibratedFingers = false;
            });

            renderer.setAnimationLoop(onXRFrame);

            document.getElementById('status-line').textContent = 'SHOW HANDS TO CAMERA';
            document.getElementById('status-line').classList.add('scanning-text');

            return true;
        }

        // ============================================
        // INIT
        // ============================================
        function init() {
            setupThreeJS();

            // Main start button now triggers calibration first
            document.getElementById('btn-start').addEventListener('click', async () => {
                const btn = document.getElementById('btn-start');
                btn.disabled = true;
                btn.textContent = 'STARTING CAMERA...';
                document.getElementById('start-overlay').style.display = 'none';
                await startScanning();
            });

            // Retry button
            document.getElementById('scan-retry').addEventListener('click', () => {
                retryScan();
            });

            window.addEventListener('resize', () => {
                if (renderer && !xrSession) {
                    renderer.setSize(window.innerWidth, window.innerHeight);
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                }
            });
        }

        init();
        console.log('AR Block Builder with Finger Calibration');
        console.log('1. Click START CALIBRATION');
        console.log('2. Place THUMB in the scanning box');
        console.log('3. Place INDEX FINGER in the scanning box');
        console.log('4. Enter AR and pinch to place blocks');
    </script>
</body>
