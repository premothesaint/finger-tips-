<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Block Builder</title>
    <style>
        :root {
            --neon-green: #00ff41;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            position: fixed;
        }

        #main-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #camera-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        #overlay-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #three-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* Calibration UI */
        #calibration-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        #scan-zone {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            border: 3px dashed var(--neon-green);
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.3), inset 0 0 40px rgba(0, 255, 65, 0.08);
            transition: all 0.3s;
        }

        #scan-zone.scanning {
            animation: zonePulse 1.5s infinite;
        }

        #scan-zone.success {
            border-style: solid;
            border-color: #00ff41;
            box-shadow: 0 0 60px rgba(0, 255, 65, 0.6), inset 0 0 60px rgba(0, 255, 65, 0.2);
            animation: successGlow 0.6s infinite;
        }

        #scan-zone.hidden {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.5);
        }

        @keyframes zonePulse {
            0%, 100% { box-shadow: 0 0 30px rgba(0, 255, 65, 0.2), inset 0 0 30px rgba(0, 255, 65, 0.05); }
            50% { box-shadow: 0 0 55px rgba(0, 255, 65, 0.4), inset 0 0 55px rgba(0, 255, 65, 0.12); }
        }

        @keyframes successGlow {
            0%, 100% { box-shadow: 0 0 40px rgba(0, 255, 65, 0.4), inset 0 0 40px rgba(0, 255, 65, 0.1); }
            50% { box-shadow: 0 0 80px rgba(0, 255, 65, 0.8), inset 0 0 80px rgba(0, 255, 65, 0.3); }
        }

        #calibration-instruction {
            position: absolute;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--neon-green);
            font-family: 'Courier New', monospace;
            font-size: 15px;
            letter-spacing: 4px;
            text-align: center;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
            transition: all 0.4s;
        }

        #calibration-progress {
            position: absolute;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--neon-green);
            font-family: 'Courier New', monospace;
            font-size: 12px;
            letter-spacing: 3px;
            text-align: center;
            opacity: 0.7;
            transition: all 0.3s;
        }

        #calibration-dots {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 16px;
        }

        .cal-dot {
            width: 14px;
            height: 14px;
            border: 2px solid var(--neon-green);
            border-radius: 50%;
            transition: all 0.4s;
        }

        .cal-dot.active {
            background: var(--neon-green);
            box-shadow: 0 0 20px var(--neon-green);
            animation: dotGlow 1s infinite;
        }

        .cal-dot.done {
            background: var(--neon-green);
            box-shadow: 0 0 10px var(--neon-green);
        }

        @keyframes dotGlow {
            0%, 100% { box-shadow: 0 0 15px var(--neon-green); }
            50% { box-shadow: 0 0 30px var(--neon-green); }
        }

        #finger-indicator {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--neon-green);
            font-family: 'Courier New', monospace;
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.6;
        }

        #block-count-display {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--neon-green);
            font-family: 'Courier New', monospace;
            font-size: 13px;
            letter-spacing: 3px;
            opacity: 0;
            transition: opacity 0.5s;
        }

        #block-count-display.visible {
            opacity: 0.9;
        }

        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #start-box {
            border: 2px solid var(--neon-green);
            padding: 48px 32px;
            text-align: center;
            color: var(--neon-green);
            background: rgba(0, 0, 0, 0.95);
            max-width: 360px;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.15);
        }

        #start-box h2 {
            font-size: 16px;
            letter-spacing: 5px;
            margin-bottom: 20px;
            font-weight: normal;
        }

        #start-box p {
            font-size: 11px;
            opacity: 0.6;
            margin-bottom: 28px;
            line-height: 1.7;
            letter-spacing: 1px;
        }

        #btn-start {
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 14px 40px;
            font-family: inherit;
            font-size: 13px;
            letter-spacing: 4px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        #btn-start:active {
            background: var(--neon-green);
            color: #000;
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <div id="start-box">
            <h2>AR BLOCK BUILDER</h2>
            <p>SCAN THUMB THEN INDEX FINGER<br>
               PINCH TO PLACE OR EXTRUDE</p>
            <button id="btn-start">START</button>
        </div>
    </div>

    <div id="main-container" style="display:none;">
        <video id="camera-feed" autoplay playsinline muted></video>
        <canvas id="overlay-canvas"></canvas>
        <canvas id="three-canvas"></canvas>
        <div id="calibration-ui">
            <div id="finger-indicator">INITIALIZING...</div>
            <div id="block-count-display">BLOCKS: 0</div>
            <div id="scan-zone" class="scanning"></div>
            <div id="calibration-instruction">PLACE THUMB IN CIRCLE</div>
            <div id="calibration-progress">SCAN 1 OF 2</div>
            <div id="calibration-dots">
                <div class="cal-dot active" id="cal-dot-1"></div>
                <div class="cal-dot" id="cal-dot-2"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js">
    </script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ============================================
        // CONSTANTS
        // ============================================
        const BLOCK_SIZE = 0.06;
        const PINCH_THRESHOLD = 0.04;
        const STABLE_PINCH_FRAMES = 5;
        const REQUIRED_STABLE_FRAMES = 35;

        // ============================================
        // STATE
        // ============================================
        let scene3D, camera3D, renderer3D;
        let blocks = [];
        let pinchWasDetected = false;
        let stablePinchCount = 0;

        // Camera / calibration
        let mainStream = null;
        let mainVideo = null;
        let overlayCanvas = null;
        let overlayCtx = null;
        let handsInstance = null;
        let lastHandResults = null;
        let calibrationStep = 0;
        let calibrationStableFrames = 0;
        let calibrationComplete = false;
        let cameraUtilsInstance = null;

        // Hand data
        let currentThumbTip = null;
        let currentIndexTip = null;
        let currentHandLandmarks = null;

        // ============================================
        // THREE.JS SETUP
        // ============================================
        function setupThreeJS() {
            const canvas = document.getElementById('three-canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            scene3D = new THREE.Scene();
            camera3D = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 50);
            camera3D.position.set(0, 0, 2);
            camera3D.lookAt(0, 0, 0);

            renderer3D = new THREE.WebGLRenderer({
                canvas: canvas,
                antialias: true,
                alpha: true,
            });
            renderer3D.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer3D.setSize(window.innerWidth, window.innerHeight);
            renderer3D.setClearColor(0x000000, 0);

            const ambient = new THREE.AmbientLight(0xffffff, 0.8);
            scene3D.add(ambient);
        }

        // ============================================
        // WIREFRAME BLOCK
        // ============================================
        function createBlock(worldPos) {
            const group = new THREE.Group();
            const half = BLOCK_SIZE / 2;
            const geo = new THREE.BoxGeometry(BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);

            const fillMat = new THREE.MeshBasicMaterial({
                color: 0x00ff41,
                transparent: true,
                opacity: 0.08,
                depthWrite: false,
            });
            group.add(new THREE.Mesh(geo, fillMat));

            const edgeGeo = new THREE.EdgesGeometry(geo);
            const edgeMat = new THREE.LineBasicMaterial({
                color: 0x00ff41,
                transparent: true,
                opacity: 0.9,
            });
            group.add(new THREE.LineSegments(edgeGeo, edgeMat));

            const corners = [
                [-half, -half, -half],
                [half, -half, -half],
                [-half, half, -half],
                [half, half, -half],
                [-half, -half, half],
                [half, -half, half],
                [-half, half, half],
                [half, half, half],
            ];
            const dotGeo = new THREE.SphereGeometry(0.005, 6, 6);
            const dotMat = new THREE.MeshBasicMaterial({ color: 0x00ff41 });
            corners.forEach(c => {
                const dot = new THREE.Mesh(dotGeo, dotMat);
                dot.position.set(...c);
                group.add(dot);
            });

            group.position.copy(worldPos);
            group.userData = { isBlock: true, halfSize: half };
            return group;
        }

        function findNearestFace(point) {
            let bestBlock = null;
            let bestNormal = null;
            let bestDist = 0.06;
            const normals = [
                new THREE.Vector3(0, 1, 0),
                new THREE.Vector3(0, -1, 0),
                new THREE.Vector3(1, 0, 0),
                new THREE.Vector3(-1, 0, 0),
                new THREE.Vector3(0, 0, 1),
                new THREE.Vector3(0, 0, -1),
            ];
            for (const block of blocks) {
                const half = block.userData.halfSize;
                const bp = block.position;
                const offsets = [
                    new THREE.Vector3(0, half, 0),
                    new THREE.Vector3(0, -half, 0),
                    new THREE.Vector3(half, 0, 0),
                    new THREE.Vector3(-half, 0, 0),
                    new THREE.Vector3(0, 0, half),
                    new THREE.Vector3(0, 0, -half),
                ];
                for (let i = 0; i < 6; i++) {
                    const fc = bp.clone().add(offsets[i]);
                    const dist = point.distanceTo(fc);
                    if (dist < bestDist) {
                        bestDist = dist;
                        bestBlock = block;
                        bestNormal = normals[i];
                    }
                }
            }
            return { block: bestBlock, normal: bestNormal };
        }

        function placeBlock(worldPos) {
            const block = createBlock(worldPos);
            scene3D.add(block);
            blocks.push(block);
            updateBlockCount();
        }

        function extrudeBlock(sourceBlock, normal) {
            const offset = normal.clone().multiplyScalar(BLOCK_SIZE * 1.05);
            const newPos = sourceBlock.position.clone().add(offset);
            const block = createBlock(newPos);
            scene3D.add(block);
            blocks.push(block);
            block.scale.set(0.01, 0.01, 0.01);
            const start = performance.now();

            function anim(time) {
                const t = Math.min((time - start) / 250, 1);
                block.scale.setScalar(1 - Math.pow(1 - t, 3));
                if (t < 1) requestAnimationFrame(anim);
            }
            requestAnimationFrame(anim);
            updateBlockCount();
        }

        function updateBlockCount() {
            document.getElementById('block-count-display').textContent = `BLOCKS: ${blocks.length}`;
        }

        // ============================================
        // SCREEN TO WORLD COORDINATES
        // ============================================
        function screenToWorld(screenX, screenY, depthZ = 0.5) {
            const ndcX = (screenX / window.innerWidth) * 2 - 1;
            const ndcY = -(screenY / window.innerHeight) * 2 + 1;
            const vec = new THREE.Vector3(ndcX, ndcY, 0.5);
            vec.unproject(camera3D);
            const dir = vec.sub(camera3D.position).normalize();
            const distance = (depthZ - camera3D.position.z) / dir.z;
            return camera3D.position.clone().add(dir.multiplyScalar(distance));
        }

        // ============================================
        // MEDIAPIPE HANDS
        // ============================================
        async function initMediaPipeHands() {
            handsInstance = new Hands({
                locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`;
                }
            });
            handsInstance.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.7,
            });
            handsInstance.onResults(onHandResults);
        }

        function onHandResults(results) {
            lastHandResults = results;
            drawHandOverlay(results);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                currentHandLandmarks = landmarks;
                currentThumbTip = landmarks[4];
                currentIndexTip = landmarks[8];
            } else {
                currentHandLandmarks = null;
                currentThumbTip = null;
                currentIndexTip = null;
            }

            if (!calibrationComplete) {
                runCalibrationStep();
            } else {
                handlePinchDetection();
            }
        }

        function drawHandOverlay(results) {
            if (!overlayCtx) return;
            const w = overlayCanvas.width;
            const h = overlayCanvas.height;
            overlayCtx.clearRect(0, 0, w, h);

            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) return;

            const landmarks = results.multiHandLandmarks[0];

            // Draw connections
            const connections = [
                [0, 1],
                [1, 2],
                [2, 3],
                [3, 4],
                [0, 5],
                [5, 6],
                [6, 7],
                [7, 8],
                [0, 9],
                [9, 10],
                [10, 11],
                [11, 12],
                [0, 13],
                [13, 14],
                [14, 15],
                [15, 16],
                [0, 17],
                [17, 18],
                [18, 19],
                [19, 20],
                [5, 9],
                [9, 13],
                [13, 17],
            ];
            overlayCtx.strokeStyle = 'rgba(0, 255, 65, 0.35)';
            overlayCtx.lineWidth = 1;
            connections.forEach(([a, b]) => {
                const ax = landmarks[a].x * w;
                const ay = landmarks[a].y * h;
                const bx = landmarks[b].x * w;
                const by = landmarks[b].y * h;
                overlayCtx.beginPath();
                overlayCtx.moveTo(ax, ay);
                overlayCtx.lineTo(bx, by);
                overlayCtx.stroke();
            });

            // Draw all joints
            overlayCtx.fillStyle = 'rgba(0, 255, 65, 0.5)';
            landmarks.forEach((lm, i) => {
                const x = lm.x * w;
                const y = lm.y * h;
                overlayCtx.beginPath();
                overlayCtx.arc(x, y, 3, 0, 2 * Math.PI);
                overlayCtx.fill();
            });

            // Highlight thumb tip (4) and index tip (8)
            [4, 8].forEach(i => {
                if (landmarks[i]) {
                    const x = landmarks[i].x * w;
                    const y = landmarks[i].y * h;
                    const label = i === 4 ? 'THUMB' : 'INDEX';

                    overlayCtx.fillStyle = '#00ff41';
                    overlayCtx.beginPath();
                    overlayCtx.arc(x, y, 10, 0, 2 * Math.PI);
                    overlayCtx.fill();
                    overlayCtx.strokeStyle = '#00ff41';
                    overlayCtx.lineWidth = 2;
                    overlayCtx.stroke();

                    overlayCtx.fillStyle = '#000';
                    overlayCtx.font = 'bold 11px "Courier New", monospace';
                    overlayCtx.textAlign = 'center';
                    overlayCtx.fillText(label, x, y - 18);
                    overlayCtx.fillStyle = '#00ff41';
                    overlayCtx.fillText(label, x, y - 17);
                }
            });
        }

        // ============================================
        // CALIBRATION
        // ============================================
        function isFingerInZone(landmark) {
            if (!landmark) return false;
            const w = overlayCanvas.width;
            const h = overlayCanvas.height;
            const cx = w / 2;
            const cy = h / 2;
            const x = landmark.x * w;
            const y = landmark.y * h;
            const dx = x - cx;
            const dy = y - cy;
            return Math.sqrt(dx * dx + dy * dy) < 85;
        }

        function runCalibrationStep() {
            const indicator = document.getElementById('finger-indicator');
            const instruction = document.getElementById('calibration-instruction');
            const progress = document.getElementById('calibration-progress');
            const zone = document.getElementById('scan-zone');

            if (!currentHandLandmarks) {
                calibrationStableFrames = 0;
                indicator.textContent = 'DETECTING HAND...';
                zone.classList.remove('success');
                zone.classList.add('scanning');
                return;
            }

            indicator.textContent = 'HAND DETECTED';
            const targetIdx = calibrationStep === 0 ? 4 : 8;
            const targetName = calibrationStep === 0 ? 'THUMB' : 'INDEX FINGER';
            const targetLandmark = currentHandLandmarks[targetIdx];

            if (isFingerInZone(targetLandmark)) {
                calibrationStableFrames++;
                zone.classList.add('success');
                zone.classList.remove('scanning');
                instruction.textContent = `HOLD ${targetName} STEADY`;
                const pct = Math.min(100, Math.round((calibrationStableFrames / REQUIRED_STABLE_FRAMES) * 100));
                progress.textContent = `${pct}%`;

                if (calibrationStableFrames >= REQUIRED_STABLE_FRAMES) {
                    if (calibrationStep === 0) {
                        calibrationStep = 1;
                        calibrationStableFrames = 0;
                        zone.classList.remove('success');
                        zone.classList.add('scanning');
                        instruction.textContent = 'PLACE INDEX FINGER IN CIRCLE';
                        progress.textContent = 'SCAN 2 OF 2';
                        document.getElementById('cal-dot-1').classList.remove('active');
                        document.getElementById('cal-dot-1').classList.add('done');
                        document.getElementById('cal-dot-2').classList.add('active');
                    } else if (calibrationStep === 1) {
                        // Complete calibration
                        calibrationComplete = true;
                        calibrationStep = 2;
                        document.getElementById('cal-dot-2').classList.remove('active');
                        document.getElementById('cal-dot-2').classList.add('done');
                        instruction.textContent = 'CALIBRATED';
                        progress.textContent = '';
                        indicator.textContent = 'READY';

                        // Hide scan zone
                        zone.classList.add('hidden');
                        zone.classList.remove('success', 'scanning');

                        // Show block count
                        document.getElementById('block-count-display').classList.add('visible');

                        // Place initial cube at center
                        const worldPos = screenToWorld(window.innerWidth / 2, window.innerHeight / 2, 0.5);
                        placeBlock(worldPos);
                    }
                }
            } else {
                calibrationStableFrames = Math.max(0, calibrationStableFrames - 3);
                zone.classList.remove('success');
                zone.classList.add('scanning');
                instruction.textContent = `PLACE ${targetName} IN CIRCLE`;
                progress.textContent = calibrationStep === 0 ? 'SCAN 1 OF 2' : 'SCAN 2 OF 2';
            }
        }

        // ============================================
        // PINCH DETECTION (after calibration)
        // ============================================
        function handlePinchDetection() {
            if (!currentThumbTip || !currentIndexTip) return;

            const w = overlayCanvas.width;
            const h = overlayCanvas.height;
            const tx = currentThumbTip.x * w;
            const ty = currentThumbTip.y * h;
            const ix = currentIndexTip.x * w;
            const iy = currentIndexTip.y * h;
            const dx = tx - ix;
            const dy = ty - iy;
            const dist = Math.sqrt(dx * dx + dy * dy);

            const isPinching = dist < 35; // pixels

            if (isPinching) {
                stablePinchCount++;
            } else {
                stablePinchCount = 0;
            }

            const stablePinch = stablePinchCount >= STABLE_PINCH_FRAMES;
            const pinchTriggered = stablePinch && !pinchWasDetected;
            pinchWasDetected = stablePinch;

            if (pinchTriggered) {
                // Use midpoint between thumb and index as placement position
                const midX = (tx + ix) / 2;
                const midY = (ty + iy) / 2;
                const worldPos = screenToWorld(midX, midY, 0.5);
                const faceResult = findNearestFace(worldPos);

                if (faceResult.block && faceResult.normal) {
                    extrudeBlock(faceResult.block, faceResult.normal);
                } else {
                    placeBlock(worldPos);
                }
            }
        }

        // ============================================
        // CAMERA SETUP
        // ============================================
        async function startCamera() {
            const video = document.getElementById('camera-feed');
            const canvas = document.getElementById('overlay-canvas');

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            overlayCanvas = canvas;
            overlayCtx = canvas.getContext('2d');

            try {
                mainStream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                    }
                });
                video.srcObject = mainStream;
                video.playsInline = true;
                await video.play();
                mainVideo = video;

                document.getElementById('finger-indicator').textContent = 'INITIALIZING...';

                // Initialize MediaPipe
                if (!handsInstance) {
                    await initMediaPipeHands();
                }

                // Start processing
                cameraUtilsInstance = new Camera(video, {
                    onFrame: async () => {
                        if (handsInstance) {
                            await handsInstance.send({ image: video });
                        }
                    },
                    width: 640,
                    height: 480,
                });
                cameraUtilsInstance.start();

            } catch (e) {
                console.error('Camera error:', e);
                document.getElementById('finger-indicator').textContent = 'CAMERA ERROR';
            }
        }

        // ============================================
        // RENDER LOOP
        // ============================================
        function renderLoop() {
            if (calibrationComplete && blocks.length > 0) {
                // Update camera based on device orientation for AR-like feel
                // Keep blocks visible
            }

            renderer3D.render(scene3D, camera3D);
            requestAnimationFrame(renderLoop);
        }

        // ============================================
        // START
        // ============================================
        function startApp() {
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('main-container').style.display = 'block';
            setupThreeJS();
            startCamera();
            requestAnimationFrame(renderLoop);
        }

        // ============================================
        // INIT
        // ============================================
        function init() {
            document.getElementById('btn-start').addEventListener('click', () => {
                startApp();
            });

            window.addEventListener('resize', () => {
                if (renderer3D) {
                    renderer3D.setSize(window.innerWidth, window.innerHeight);
                    camera3D.aspect = window.innerWidth / window.innerHeight;
                    camera3D.updateProjectionMatrix();
                }
                if (overlayCanvas) {
                    overlayCanvas.width = window.innerWidth;
                    overlayCanvas.height = window.innerHeight;
                }
                const threeCanvas = document.getElementById('three-canvas');
                if (threeCanvas) {
                    threeCanvas.width = window.innerWidth;
                    threeCanvas.height = window.innerHeight;
                }
            });
        }

        init();
    </script>
</body>
</html>
