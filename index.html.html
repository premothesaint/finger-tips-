<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Block Builder</title>
    <style>
        :root {
            --neon-green: #00ff41;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            position: fixed;
        }

        #status-line {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: var(--neon-green);
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
            text-align: center;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
            transition: opacity 0.3s;
        }

        .scanning-text {
            animation: scanPulse 2s infinite;
        }

        @keyframes scanPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #start-box {
            border: 2px solid var(--neon-green);
            padding: 48px 32px;
            text-align: center;
            color: var(--neon-green);
            background: rgba(0, 0, 0, 0.95);
            max-width: 340px;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.15);
        }

        #start-box h2 {
            font-size: 16px;
            letter-spacing: 5px;
            margin-bottom: 20px;
            font-weight: normal;
        }

        #start-box p {
            font-size: 11px;
            opacity: 0.6;
            margin-bottom: 28px;
            line-height: 1.7;
            letter-spacing: 1px;
        }

        #btn-start {
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 14px 40px;
            font-family: inherit;
            font-size: 13px;
            letter-spacing: 4px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        #btn-start:active {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.6);
        }

        #btn-start:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        #error-msg {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            color: #ff4444;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            letter-spacing: 1px;
            text-align: center;
            padding: 10px 20px;
            border: 1px solid #ff4444;
            background: rgba(0, 0, 0, 0.9);
            display: none;
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <div id="start-box">
            <h2>AR BLOCK BUILDER</h2>
            <p>SHOW HANDS TO CAMERA<br>
               INDEX + THUMB TO PLACE<br>
               NEAR FACE TO EXTRUDE</p>
            <button id="btn-start">ENTER AR</button>
        </div>
    </div>

    <div id="status-line" class="scanning-text">READY</div>
    <div id="error-msg"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ============================================
        // CONSTANTS
        // ============================================
        const BLOCK_SIZE = 0.08;
        const PINCH_THRESHOLD = 0.03;
        const STABLE_PINCH_FRAMES = 5;

        // ============================================
        // STATE
        // ============================================
        let scene, camera, renderer;
        let xrSession = null;
        let xrReferenceSpace = null;
        let blocks = [];
        let handJointGroups = [];
        let pinchWasDetected = false;
        let stablePinchCount = 0;
        let primaryHandIndex = -1;

        // ============================================
        // THREE.JS SETUP
        // ============================================
        function setupThreeJS() {
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 50);

            renderer = new THREE.WebGLRenderer({
                antialias: true,
                alpha: true,
                powerPreference: 'high-performance',
            });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            renderer.setClearColor(0x000000, 0);
            document.body.appendChild(renderer.domElement);

            // Ambient light for consistent color
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);
        }

        // ============================================
        // WIREFRAME BLOCK
        // ============================================
        function createWireframeBlock(position) {
            const group = new THREE.Group();
            const half = BLOCK_SIZE / 2;

            // Semi-transparent inner
            const geo = new THREE.BoxGeometry(BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
            const mat = new THREE.MeshBasicMaterial({
                color: 0x00ff41,
                transparent: true,
                opacity: 0.06,
                depthWrite: false,
            });
            group.add(new THREE.Mesh(geo, mat));

            // Wireframe edges
            const edges = new THREE.EdgesGeometry(geo);
            const edgeMat = new THREE.LineBasicMaterial({
                color: 0x00ff41,
                transparent: true,
                opacity: 0.9,
            });
            group.add(new THREE.LineSegments(edges, edgeMat));

            // Corner dots
            const corners = [
                [-half, -half, -half], [half, -half, -half],
                [-half, half, -half], [half, half, -half],
                [-half, -half, half], [half, -half, half],
                [-half, half, half], [half, half, half],
            ];
            const dotGeo = new THREE.SphereGeometry(0.006, 6, 6);
            const dotMat = new THREE.MeshBasicMaterial({ color: 0x00ff41 });
            corners.forEach(c => {
                const dot = new THREE.Mesh(dotGeo, dotMat);
                dot.position.set(...c);
                group.add(dot);
            });

            group.position.copy(position);
            group.userData = {
                isBlock: true,
                blockId: crypto.randomUUID ? crypto.randomUUID() : Date.now() + Math.random(),
                halfSize: half,
            };

            return group;
        }

        // ============================================
        // FIND NEAREST FACE
        // ============================================
        function findNearestFace(point) {
            let bestBlock = null;
            let bestNormal = null;
            let bestDist = 0.07;

            const normals = [
                new THREE.Vector3(0, 1, 0),
                new THREE.Vector3(0, -1, 0),
                new THREE.Vector3(1, 0, 0),
                new THREE.Vector3(-1, 0, 0),
                new THREE.Vector3(0, 0, 1),
                new THREE.Vector3(0, 0, -1),
            ];

            for (const block of blocks) {
                const half = block.userData.halfSize;
                const bp = block.position;

                const offsets = [
                    new THREE.Vector3(0, half, 0),
                    new THREE.Vector3(0, -half, 0),
                    new THREE.Vector3(half, 0, 0),
                    new THREE.Vector3(-half, 0, 0),
                    new THREE.Vector3(0, 0, half),
                    new THREE.Vector3(0, 0, -half),
                ];

                for (let i = 0; i < 6; i++) {
                    const fc = bp.clone().add(offsets[i]);
                    const dist = point.distanceTo(fc);
                    if (dist < bestDist) {
                        bestDist = dist;
                        bestBlock = block;
                        bestNormal = normals[i];
                    }
                }
            }

            return { block: bestBlock, normal: bestNormal };
        }

        // ============================================
        // PLACE / EXTRUDE
        // ============================================
        function placeBlock(position) {
            const block = createWireframeBlock(position);
            scene.add(block);
            blocks.push(block);
            updateStatus();
            return block;
        }

        function extrudeBlock(sourceBlock, normal) {
            const offset = normal.clone().multiplyScalar(BLOCK_SIZE * 1.05);
            const newPos = sourceBlock.position.clone().add(offset);
            const block = createWireframeBlock(newPos);
            scene.add(block);
            blocks.push(block);

            // Animate
            block.scale.set(0.01, 0.01, 0.01);
            const startTime = performance.now();
            const duration = 250;

            function anim(time) {
                const elapsed = time - startTime;
                const t = Math.min(elapsed / duration, 1);
                block.scale.setScalar(1 - Math.pow(1 - t, 3));
                if (t < 1) requestAnimationFrame(anim);
            }
            requestAnimationFrame(anim);

            updateStatus();
            return block;
        }

        function updateStatus() {
            document.getElementById('status-line').textContent = `BLOCKS: ${blocks.length}`;
        }

        // ============================================
        // HAND VISUALS
        // ============================================
        function createHandJointVisual() {
            const group = new THREE.Group();
            const joints = [];

            const geo = new THREE.SphereGeometry(0.005, 8, 8);
            const mat = new THREE.MeshBasicMaterial({
                color: 0x00ff41,
                transparent: true,
                opacity: 0.6,
            });

            // 25 joints per hand
            for (let i = 0; i < 25; i++) {
                const sphere = new THREE.Mesh(geo, mat.clone());
                sphere.visible = false;
                sphere.scale.setScalar(1.0);
                group.add(sphere);
                joints.push(sphere);
            }

            group.userData = { joints };
            return group;
        }

        function updateHandVisual(group, handJoints) {
            const joints = group.userData.joints;

            if (!handJoints) {
                joints.forEach(j => j.visible = false);
                return { thumbTip: null, indexTip: null };
            }

            for (let i = 0; i < joints.length; i++) {
                if (handJoints[i]) {
                    joints[i].position.copy(handJoints[i]);
                    joints[i].visible = true;
                } else {
                    joints[i].visible = false;
                }
            }

            // Highlight thumb tip (index 4) and index tip (index 8)
            const thumbTip = handJoints[4] || null;
            const indexTip = handJoints[8] || null;

            if (joints[4]) {
                joints[4].material.opacity = 1.0;
                joints[4].scale.setScalar(2.0);
            }
            if (joints[8]) {
                joints[8].material.opacity = 1.0;
                joints[8].scale.setScalar(2.0);
            }

            return { thumbTip, indexTip };
        }

        // ============================================
        // GET JOINTS FROM XR HAND
        // ============================================
        function getHandJointPositions(hand, referenceSpace) {
            if (!hand) return null;
            const joints = [];
            for (let i = 0; i < 25; i++) {
                try {
                    const joint = hand.getJoint(i);
                    if (joint) {
                        const pose = joint.getPose(referenceSpace);
                        if (pose && pose.transform) {
                            const p = pose.transform.position;
                            joints.push(new THREE.Vector3(p.x, p.y, p.z));
                        } else {
                            joints.push(null);
                        }
                    } else {
                        joints.push(null);
                    }
                } catch (e) {
                    joints.push(null);
                }
            }
            return joints;
        }

        // ============================================
        // XR FRAME LOOP
        // ============================================
        function onXRFrame(time, frame) {
            if (!frame || !xrSession || !xrReferenceSpace) return;

            const inputSources = xrSession.inputSources;

            // Find hands
            let hands = [null, null]; // [right, left]

            for (const source of inputSources) {
                if (source.hand) {
                    if (source.handedness === 'right') hands[0] = source.hand;
                    if (source.handedness === 'left') hands[1] = source.hand;
                }
            }

            // Prefer right hand as primary, fallback to left
            const primaryHand = hands[0] || hands[1];
            const secondaryHand = (hands[0] && hands[1]) ? hands[1] : null;
            const primaryIdx = hands[0] ? 0 : 1;

            // Update visuals
            let thumbTip = null;
            let indexTip = null;

            // Ensure we have enough hand groups
            while (handJointGroups.length < 2) {
                const group = createHandJointVisual();
                handJointGroups.push(group);
                scene.add(group);
            }

            if (primaryHand) {
                const joints = getHandJointPositions(primaryHand, xrReferenceSpace);
                const result = updateHandVisual(handJointGroups[0], joints);
                thumbTip = result.thumbTip;
                indexTip = result.indexTip;
            } else {
                updateHandVisual(handJointGroups[0], null);
            }

            if (secondaryHand) {
                const joints = getHandJointPositions(secondaryHand, xrReferenceSpace);
                updateHandVisual(handJointGroups[1], joints);
            } else if (handJointGroups[1]) {
                updateHandVisual(handJointGroups[1], null);
            }

            // Pinch detection
            let isPinching = false;
            if (thumbTip && indexTip) {
                const dist = thumbTip.distanceTo(indexTip);
                isPinching = dist < PINCH_THRESHOLD;
            }

            // Debounce
            if (isPinching) {
                stablePinchCount++;
            } else {
                stablePinchCount = 0;
            }

            const stablePinch = stablePinchCount >= STABLE_PINCH_FRAMES;
            const pinchTriggered = stablePinch && !pinchWasDetected;
            pinchWasDetected = stablePinch;

            // Update status
            const statusEl = document.getElementById('status-line');
            if (!primaryHand) {
                statusEl.textContent = 'SHOW HANDS TO CAMERA';
                statusEl.classList.add('scanning-text');
            } else if (isPinching) {
                statusEl.textContent = 'PINCH DETECTED';
                statusEl.classList.remove('scanning-text');
            } else {
                statusEl.textContent = `BLOCKS: ${blocks.length}`;
                statusEl.classList.remove('scanning-text');
            }

            // Handle pinch
            if (pinchTriggered && indexTip) {
                const faceResult = findNearestFace(indexTip);
                if (faceResult.block && faceResult.normal) {
                    extrudeBlock(faceResult.block, faceResult.normal);
                } else {
                    placeBlock(indexTip.clone());
                }
            }

            renderer.render(scene, camera);
        }

        // ============================================
        // START AR SESSION
        // ============================================
        async function startARSession() {
            const errorEl = document.getElementById('error-msg');
            errorEl.style.display = 'none';

            // Check WebXR support
            if (!navigator.xr) {
                errorEl.textContent = 'WebXR not supported. Use Chrome on Android.';
                errorEl.style.display = 'block';
                return;
            }

            // Check AR support
            let arSupported = false;
            try {
                arSupported = await navigator.xr.isSessionSupported('immersive-ar');
            } catch (e) {
                errorEl.textContent = 'Error checking AR support: ' + e.message;
                errorEl.style.display = 'block';
                return;
            }

            if (!arSupported) {
                errorEl.textContent = 'AR not supported on this device.';
                errorEl.style.display = 'block';
                return;
            }

            // Check hand tracking support
            let handTrackingSupported = false;
            try {
                handTrackingSupported = await navigator.xr.isSessionSupported('immersive-ar');
                // We'll request hand-tracking as optional since not all devices support it
            } catch (e) {
                // Continue anyway
            }

            const sessionInit = {
                requiredFeatures: ['local'],
                optionalFeatures: ['hand-tracking', 'hit-test'],
            };

            try {
                xrSession = await navigator.xr.requestSession('immersive-ar', sessionInit);
            } catch (e) {
                errorEl.textContent = 'Failed to start AR: ' + e.message;
                errorEl.style.display = 'block';
                return;
            }

            xrReferenceSpace = await xrSession.requestReferenceSpace('local');

            await renderer.xr.setSession(xrSession);

            // Check if hand tracking is actually available
            const hasHandTracking = xrSession.inputSources && 
                Array.from(xrSession.inputSources).some(s => s.hand);

            document.getElementById('status-line').textContent = 
                hasHandTracking ? 'SHOW HANDS' : 'HAND TRACKING NOT AVAILABLE';

            // Session end handler
            xrSession.addEventListener('end', () => {
                xrSession = null;
                xrReferenceSpace = null;
                renderer.setAnimationLoop(null);
                document.getElementById('status-line').textContent = 'SESSION ENDED';
                document.getElementById('start-overlay').style.display = 'flex';
                document.getElementById('btn-start').disabled = false;
                document.getElementById('btn-start').textContent = 'ENTER AR';
            });

            // Set animation loop
            renderer.setAnimationLoop(onXRFrame);

            // Hide overlay
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('status-line').classList.add('scanning-text');
        }

        // ============================================
        // INIT
        // ============================================
        function init() {
            setupThreeJS();

            document.getElementById('btn-start').addEventListener('click', async () => {
                const btn = document.getElementById('btn-start');
                btn.disabled = true;
                btn.textContent = 'STARTING...';
                await startARSession();
                if (!xrSession) {
                    btn.disabled = false;
                    btn.textContent = 'ENTER AR';
                }
            });

            window.addEventListener('resize', () => {
                if (renderer && !xrSession) {
                    renderer.setSize(window.innerWidth, window.innerHeight);
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                }
            });
        }

        init();
        console.log('AR Block Builder initialized');
        console.log('Hand tracking: index + thumb pinch to place/extrude blocks');
    </script>
</body>
</html>
