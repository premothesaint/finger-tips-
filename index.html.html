<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover">
  <title>WebAR · Wireframe Cube with Hand Lift</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000;
      touch-action: manipulation;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      position: fixed;
    }
    
    #start-button {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 16px 32px;
      font-size: 17px;
      font-weight: 600;
      background: rgba(255,255,255,0.95);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      z-index: 100;
      color: #111;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      transition: all 0.2s;
    }
    
    #start-button:active {
      transform: translate(-50%, -50%) scale(0.95);
    }
    
    #info-bar {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.9);
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      padding: 10px 24px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      pointer-events: none;
      z-index: 50;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.15);
      max-width: 90vw;
      text-align: center;
      transition: all 0.3s;
    }
    
    #grab-indicator {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80px;
      height: 80px;
      border: 3px solid rgba(0, 255, 136, 0.8);
      border-radius: 50%;
      pointer-events: none;
      z-index: 45;
      display: none;
      animation: grabPulse 1.5s infinite;
    }
    
    @keyframes grabPulse {
      0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.4; }
      50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.4; }
    }
    
    #lift-meter {
      position: fixed;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      z-index: 60;
      height: 200px;
    }
    #lift-meter.active {
      display: flex;
    }
    
    #lift-label {
      color: white;
      font-size: 11px;
      font-weight: 600;
      background: rgba(0,255,136,0.3);
      padding: 4px 10px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(0,255,136,0.5);
    }
    
    .lift-track {
      width: 6px;
      height: 140px;
      background: rgba(255,255,255,0.2);
      border-radius: 3px;
      position: relative;
    }
    
    .lift-fill {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: linear-gradient(to top, #00ff88, #008855);
      border-radius: 3px;
      transition: height 0.2s;
    }
    
    #reset-cube-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      display: none;
      z-index: 60;
      background: rgba(255,70,70,0.3);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,100,100,0.5);
      color: white;
      padding: 10px 20px;
      border-radius: 25px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    #reset-cube-btn.active {
      display: block;
    }
    #reset-cube-btn:active {
      background: rgba(255,70,70,0.6);
      transform: scale(0.95);
    }
    
    #desktop-hint {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.6);
      font-size: 11px;
      background: rgba(0,0,0,0.5);
      padding: 6px 14px;
      border-radius: 20px;
      display: none;
      z-index: 55;
      pointer-events: none;
    }
    
    @media (min-width: 768px) {
      #desktop-hint.active {
        display: block;
      }
    }
  </style>
</head>
<body>
  <button id="start-button">✨ Start AR Experience</button>
  
  <div id="desktop-hint">🖱️ Click & drag to lift cube · Scroll to resize · R to reset</div>
  <div id="grab-indicator"></div>
  
  <div id="lift-meter">
    <span id="lift-label">0.0m</span>
    <div class="lift-track">
      <div class="lift-fill" id="lift-fill" style="height: 50%;"></div>
    </div>
    <span style="color:rgba(255,255,255,0.5);font-size:9px;">LIFT</span>
  </div>
  
  <button id="reset-cube-btn">↩ Replace Cube</button>
  
  <div id="info-bar">Point your camera at a surface</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { ARButton } from 'three/addons/webxr/ARButton.js';
    
    // --- SCENE SETUP ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 40);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.xr.enabled = true;
    document.body.appendChild(renderer.domElement);
    
    // Lighting
    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
    dirLight.position.set(1, 1, 1);
    scene.add(dirLight);
    
    // --- CREATE WIREFRAME CUBE WITH DIFFRACTION EFFECT ---
    const cubeGroup = new THREE.Group();
    const cubeSize = 0.15;
    
    // Multiple colored wireframe layers for diffraction/holographic effect
    const wireframeLayers = [
      { color: 0xff006e, offset: [0.004, 0, 0], rotationSpeed: 0.003 },
      { color: 0x00f5d4, offset: [-0.004, 0, 0], rotationSpeed: -0.003 },
      { color: 0x3a86ff, offset: [0, 0.004, 0], rotationSpeed: 0.002 },
      { color: 0xffbe0b, offset: [0, -0.004, 0], rotationSpeed: -0.002 },
      { color: 0x8338ec, offset: [0, 0, 0.004], rotationSpeed: 0.004 },
      { color: 0xfb5607, offset: [0, 0, -0.004], rotationSpeed: -0.004 }
    ];
    
    const wireframeMeshes = [];
    const wireframeData = [];
    
    wireframeLayers.forEach(({ color, offset, rotationSpeed }) => {
      const geometry = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);
      const edges = new THREE.EdgesGeometry(geometry);
      const wireframe = new THREE.LineSegments(
        edges,
        new THREE.LineBasicMaterial({ 
          color: color,
          transparent: true,
          opacity: 0.8
        })
      );
      wireframe.position.set(offset[0], offset[1], offset[2]);
      cubeGroup.add(wireframe);
      wireframeMeshes.push(wireframe);
      wireframeData.push({ mesh: wireframe, rotationSpeed });
    });
    
    // Add glowing corner spheres
    const cornerGeometry = new THREE.SphereGeometry(0.008, 8, 8);
    const cornerMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
    
    for (let x = -0.5; x <= 0.5; x++) {
      for (let y = -0.5; y <= 0.5; y++) {
        for (let z = -0.5; z <= 0.5; z++) {
          const corner = new THREE.Mesh(cornerGeometry, cornerMaterial);
          corner.position.set(x * cubeSize, y * cubeSize, z * cubeSize);
          cubeGroup.add(corner);
        }
      }
    }
    
    // Add central glow sphere
    const glowGeometry = new THREE.SphereGeometry(0.02, 16, 16);
    const glowMaterial = new THREE.MeshBasicMaterial({ 
      color: 0x00ff88,
      transparent: true,
      opacity: 0.3
    });
    const glowSphere = new THREE.Mesh(glowGeometry, glowMaterial);
    cubeGroup.add(glowSphere);
    
    cubeGroup.visible = false;
    scene.add(cubeGroup);
    
    // --- STATE ---
    let cubeBaseY = 0;
    let currentLift = 0;
    const MIN_LIFT = -1;
    const MAX_LIFT = 3;
    let isGrabbing = false;
    let isDragging = false;
    let prevTouchY = 0;
    let prevTouchX = 0;
    let initialCubeY = 0;
    
    // --- UI ELEMENTS ---
    const infoBar = document.getElementById('info-bar');
    const startButton = document.getElementById('start-button');
    const grabIndicator = document.getElementById('grab-indicator');
    const liftMeter = document.getElementById('lift-meter');
    const liftLabel = document.getElementById('lift-label');
    const liftFill = document.getElementById('lift-fill');
    const resetCubeBtn = document.getElementById('reset-cube-btn');
    const desktopHint = document.getElementById('desktop-hint');
    
    function showControls() {
      liftMeter.classList.add('active');
      resetCubeBtn.classList.add('active');
      desktopHint.classList.add('active');
    }
    
    function hideControls() {
      liftMeter.classList.remove('active');
      resetCubeBtn.classList.remove('active');
      desktopHint.classList.remove('active');
      grabIndicator.style.display = 'none';
    }
    
    // --- LIFT METER ---
    function liftToPercent(lift) {
      return ((lift - MIN_LIFT) / (MAX_LIFT - MIN_LIFT)) * 100;
    }
    
    function updateLiftMeter() {
      const percent = liftToPercent(currentLift);
      liftFill.style.height = percent + '%';
      liftLabel.textContent = currentLift.toFixed(2) + 'm';
    }
    
    function setLift(newLift) {
      currentLift = Math.min(MAX_LIFT, Math.max(MIN_LIFT, newLift));
      if (cubeGroup.visible) {
        cubeGroup.position.y = cubeBaseY + currentLift;
      }
      updateLiftMeter();
    }
    
    // --- RETICLE FOR SURFACE DETECTION ---
    const reticleGroup = new THREE.Group();
    reticleGroup.visible = false;
    reticleGroup.matrixAutoUpdate = false;
    scene.add(reticleGroup);
    
    const reticleSize = 0.18;
    const rh = reticleSize / 2;
    
    // Ring
    const ringShape = new THREE.Shape();
    ringShape.moveTo(-rh, -rh);
    ringShape.lineTo(rh, -rh);
    ringShape.lineTo(rh, rh);
    ringShape.lineTo(-rh, rh);
    ringShape.closePath();
    
    const holePath = new THREE.Path();
    const innerH = rh - 0.02;
    holePath.moveTo(-innerH, -innerH);
    holePath.lineTo(innerH, -innerH);
    holePath.lineTo(innerH, innerH);
    holePath.lineTo(-innerH, innerH);
    holePath.closePath();
    ringShape.holes.push(holePath);
    
    const ringGeo = new THREE.ShapeGeometry(ringShape);
    const ringMat = new THREE.MeshBasicMaterial({
      color: 0xffffff,
      side: THREE.DoubleSide,
      transparent: true,
      opacity: 0.5,
      depthTest: true,
      depthWrite: false
    });
    reticleGroup.add(new THREE.Mesh(ringGeo, ringMat));
    
    // Fill
    const fillGeo = new THREE.PlaneGeometry(reticleSize - 0.03, reticleSize - 0.03);
    const fillMat = new THREE.MeshBasicMaterial({
      color: 0x00ff88,
      side: THREE.DoubleSide,
      transparent: true,
      opacity: 0.0,
      depthTest: true,
      depthWrite: false
    });
    reticleGroup.add(new THREE.Mesh(fillGeo, fillMat));
    
    // --- GRAB INTERACTION ---
    function startGrabbing(y, x) {
      if (!cubeGroup.visible) return;
      
      isGrabbing = true;
      isDragging = true;
      prevTouchY = y;
      prevTouchX = x;
      initialCubeY = cubeGroup.position.y;
      
      // Visual feedback
      wireframeMeshes.forEach(mesh => mesh.material.opacity = 1);
      glowMaterial.opacity = 0.6;
      grabIndicator.style.display = 'block';
      infoBar.textContent = '✊ Cube grabbed! Move up/down to lift';
    }
    
    function stopGrabbing() {
      isGrabbing = false;
      isDragging = false;
      
      wireframeMeshes.forEach(mesh => mesh.material.opacity = 0.8);
      glowMaterial.opacity = 0.3;
      grabIndicator.style.display = 'none';
      infoBar.textContent = 'Tap and drag to lift the cube';
    }
    
    // Touch events for grabbing
    renderer.domElement.addEventListener('touchstart', (e) => {
      if (!cubeGroup.visible) return;
      if (e.touches.length === 1) {
        startGrabbing(e.touches[0].clientY, e.touches[0].clientX);
        e.preventDefault();
      }
    }, { passive: false });
    
    renderer.domElement.addEventListener('touchmove', (e) => {
      if (!isDragging || !cubeGroup.visible) return;
      e.preventDefault();
      
      const dy = e.touches[0].clientY - prevTouchY;
      const dx = e.touches[0].clientX - prevTouchX;
      
      // Vertical movement for lifting
      const liftChange = -dy * 0.005;
      setLift(currentLift + liftChange);
      
      // Horizontal movement
      cubeGroup.position.x += dx * 0.002;
      
      prevTouchY = e.touches[0].clientY;
      prevTouchX = e.touches[0].clientX;
    }, { passive: false });
    
    renderer.domElement.addEventListener('touchend', () => {
      if (isGrabbing) stopGrabbing();
    });
    
    // Mouse events for desktop
    renderer.domElement.addEventListener('mousedown', (e) => {
      if (!cubeGroup.visible) return;
      startGrabbing(e.clientY, e.clientX);
    });
    
    window.addEventListener('mousemove', (e) => {
      if (!isDragging || !cubeGroup.visible) return;
      
      const dy = e.clientY - prevTouchY;
      const dx = e.clientX - prevTouchX;
      
      setLift(currentLift + (-dy * 0.005));
      cubeGroup.position.x += dx * 0.002;
      
      prevTouchY = e.clientY;
      prevTouchX = e.clientX;
    });
    
    window.addEventListener('mouseup', () => {
      if (isGrabbing) stopGrabbing();
    });
    
    // Scroll for resize
    renderer.domElement.addEventListener('wheel', (e) => {
      if (!cubeGroup.visible || isGrabbing) return;
      e.preventDefault();
      
      const scaleChange = e.deltaY > 0 ? 0.9 : 1.1;
      const newScale = cubeGroup.scale.x * scaleChange;
      cubeGroup.scale.setScalar(Math.max(0.05, Math.min(3, newScale)));
    }, { passive: false });
    
    // Reset button
    resetCubeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (!cubeGroup.visible) return;
      
      cubeGroup.visible = false;
      reticleGroup.visible = true;
      fillMat.opacity = 0.0;
      ringMat.color.set(0xffffff);
      hideControls();
      currentLift = 0;
      updateLiftMeter();
      infoBar.textContent = 'Point at a surface to place cube';
    });
    
    // --- AR SETUP ---
    let arActive = false;
    let hitTestSource = null;
    let hitTestReady = false;
    let localRefSpace = null;
    
    startButton.addEventListener('click', () => {
      startButton.textContent = 'Starting AR...';
      startButton.style.opacity = '0.7';
      
      const arBtn = ARButton.createButton(renderer, {
        requiredFeatures: ['hit-test'],
        optionalFeatures: ['dom-overlay'],
        domOverlay: { root: document.body }
      });
      arBtn.style.display = 'none';
      document.body.appendChild(arBtn);
      arBtn.click();
    });
    
    renderer.xr.addEventListener('sessionstart', async () => {
      arActive = true;
      startButton.style.display = 'none';
      infoBar.textContent = '📷 Point camera at a surface';
      
      const session = renderer.xr.getSession();
      localRefSpace = await session.requestReferenceSpace('local');
      
      session.requestReferenceSpace('viewer').then(space => {
        session.requestHitTestSource({ space }).then(src => {
          hitTestSource = src;
          hitTestReady = true;
          console.log('✅ Hit test ready');
        });
      });
      
      session.addEventListener('select', () => {
        if (isDragging) return;
        
        if (hitTestReady && reticleGroup.visible) {
          const position = new THREE.Vector3();
          position.setFromMatrixPosition(reticleGroup.matrix);
          
          cubeGroup.position.copy(position);
          cubeBaseY = position.y;
          currentLift = 0;
          
          cubeGroup.visible = true;
          cubeGroup.scale.setScalar(1);
          
          reticleGroup.visible = false;
          
          updateLiftMeter();
          showControls();
          
          infoBar.textContent = '🟦 Cube placed! Drag up/down to lift';
          setTimeout(() => {
            infoBar.textContent = 'Tap and drag to lift the cube';
          }, 3000);
          
          if (navigator.vibrate) {
            navigator.vibrate([30, 50, 30]);
          }
        }
      });
    });
    
    renderer.xr.addEventListener('sessionend', () => {
      arActive = false;
      cubeGroup.visible = false;
      reticleGroup.visible = false;
      hideControls();
      isGrabbing = false;
      isDragging = false;
      startButton.style.display = 'block';
      startButton.textContent = '✨ Start AR Experience';
      startButton.style.opacity = '1';
      infoBar.textContent = 'Point your camera at a surface';
    });
    
    // --- KEYBOARD CONTROLS ---
    window.addEventListener('keydown', (e) => {
      if (!cubeGroup.visible) return;
      
      switch(e.key) {
        case 'ArrowUp':
          e.preventDefault();
          setLift(currentLift + 0.05);
          break;
        case 'ArrowDown':
          e.preventDefault();
          setLift(currentLift - 0.05);
          break;
        case '+':
        case '=':
          e.preventDefault();
          cubeGroup.scale.multiplyScalar(1.1);
          break;
        case '-':
          e.preventDefault();
          cubeGroup.scale.multiplyScalar(0.9);
          break;
        case 'r':
        case 'R':
          if (!e.ctrlKey && !e.metaKey) {
            e.preventDefault();
            resetCubeBtn.click();
          }
          break;
      }
    });
    
    // --- ANIMATION LOOP ---
    const clock = new THREE.Clock();
    
    function animate() {
      renderer.setAnimationLoop((timestamp, frame) => {
        const time = clock.getElapsedTime();
        
        // Animate wireframes for diffraction effect
        if (cubeGroup.visible && !isGrabbing) {
          wireframeData.forEach(({ mesh, rotationSpeed }) => {
            mesh.rotation.x += rotationSpeed;
            mesh.rotation.y += rotationSpeed * 0.7;
            mesh.rotation.z += rotationSpeed * 0.3;
          });
        }
        
        // Pulse glow when grabbed
        if (isGrabbing) {
          const pulse = Math.sin(time * 4) * 0.3 + 0.6;
          glowMaterial.opacity = pulse;
        }
        
        // AR Hit testing
        if (frame && arActive && hitTestReady && localRefSpace && hitTestSource) {
          const viewerPose = frame.getViewerPose(localRefSpace);
          
          if (viewerPose && (!cubeGroup.visible)) {
            const results = frame.getHitTestResults(hitTestSource);
            
            if (results.length > 0) {
              const hit = results[0];
              const pose = hit.getPose(localRefSpace);
              reticleGroup.matrix.fromArray(pose.transform.matrix);
              
              reticleGroup.visible = true;
              fillMat.opacity = 0.6;
              ringMat.color.set(0x00ff88);
              
              infoBar.textContent = '✅ Surface found! Tap to place cube';
            } else {
              reticleGroup.visible = false;
              fillMat.opacity = 0.0;
              ringMat.color.set(0xffffff);
              infoBar.textContent = '🔍 Scanning for surface...';
            }
          }
        }
        
        renderer.render(scene, camera);
      });
    }
    
    animate();
    
    // Resize handler
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    console.log('🚀 AR Wireframe Cube Ready!');
    console.log('📱 Click "Start AR Experience" to begin');
    console.log('🎯 Features:');
    console.log('  - Surface detection with reticle');
    console.log('  - Tap to place wireframe cube');
    console.log('  - Drag up/down to lift cube');
    console.log('  - Scroll to resize');
    console.log('  - Diffraction wireframe effect');
    console.log('  - Haptic feedback on placement');
  </script>
</body>
</html>
