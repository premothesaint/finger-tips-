<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Wireframe Cube</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: Arial, sans-serif;
            overflow: hidden;
            background: #000;
            touch-action: manipulation;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }
        
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        
        #ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        #status {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            max-width: 90%;
        }
        
        #controls {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            pointer-events: auto;
        }
        
        button {
            background: rgba(0,0,0,0.85);
            color: #fff;
            border: 2px solid rgba(255,255,255,0.3);
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            min-width: 110px;
        }
        
        button:active { transform: scale(0.93); }
        
        .primary {
            background: rgba(0,255,136,0.25);
            border-color: rgba(0,255,136,0.6);
            color: #00ff88;
        }
        
        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            color: #fff;
        }
        
        .loader {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #00ff88;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <video id="video" autoplay playsinline muted></video>
    
    <div id="loading-screen">
        <div class="loader"></div>
        <div id="loading-text">Initializing...</div>
    </div>
    
    <div id="ui">
        <div id="status">Starting...</div>
        <div id="controls">
            <button class="primary" id="placeBtn">📦 Place Cube</button>
            <button id="resetBtn">🔄 Reset</button>
        </div>
    </div>

    <!-- Load Three.js from reliable CDN -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
    
    <script>
        // IMMEDIATE CHECK - Don't wait for anything
        (function() {
            const loadingScreen = document.getElementById('loading-screen');
            const loadingText = document.getElementById('loading-text');
            
            // Force hide loading after 3 seconds no matter what
            setTimeout(function() {
                if (loadingScreen.style.display !== 'none') {
                    loadingScreen.style.display = 'none';
                    document.getElementById('status').textContent = '⚠️ Loading timeout - Use mouse to interact';
                    document.getElementById('status').style.color = '#ffbe0b';
                    setupBasicMode();
                }
            }, 3000);
            
            // Check if Three.js loaded
            function checkThreeJS() {
                if (typeof THREE !== 'undefined') {
                    loadingText.textContent = 'Three.js loaded! Starting...';
                    setTimeout(initApp, 100);
                    return true;
                }
                return false;
            }
            
            // Check immediately
            if (!checkThreeJS()) {
                // Check again in 500ms
                setTimeout(function() {
                    if (!checkThreeJS()) {
                        // Check again in 1s
                        setTimeout(function() {
                            if (!checkThreeJS()) {
                                loadingText.textContent = 'Failed to load. Please refresh.';
                                setTimeout(function() {
                                    loadingScreen.style.display = 'none';
                                    setupBasicMode();
                                }, 2000);
                            }
                        }, 1000);
                    }
                }, 500);
            }
            
            function setupBasicMode() {
                // Create a simple canvas fallback without Three.js
                const canvas = document.getElementById('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                
                let cubeX = canvas.width / 2;
                let cubeY = canvas.height / 2;
                let dragging = false;
                
                function drawCube(x, y) {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    // Draw simple wireframe cube
                    const size = 100;
                    ctx.strokeStyle = '#00ff88';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(x - size/2, y - size/2, size, size);
                    
                    ctx.strokeStyle = '#ff006e';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x - size/2 + 10, y - size/2 + 10, size - 20, size - 20);
                    
                    ctx.strokeStyle = '#3a86ff';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(x - size/2 - 10, y - size/2 - 10, size + 20, size + 20);
                    
                    // Corner dots
                    ctx.fillStyle = '#fff';
                    const corners = [
                        [-1,-1], [1,-1], [-1,1], [1,1]
                    ];
                    corners.forEach(([cx, cy]) => {
                        ctx.beginPath();
                        ctx.arc(x + cx * size/2, y + cy * size/2, 5, 0, Math.PI * 2);
                        ctx.fill();
                    });
                }
                
                drawCube(cubeX, cubeY);
                
                canvas.addEventListener('mousedown', (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const mx = e.clientX - rect.left;
                    const my = e.clientY - rect.top;
                    if (Math.abs(mx - cubeX) < 60 && Math.abs(my - cubeY) < 60) {
                        dragging = true;
                        document.getElementById('status').textContent = '🖱️ Dragging cube';
                        document.getElementById('status').style.color = '#ffff00';
                    }
                });
                
                canvas.addEventListener('mousemove', (e) => {
                    if (dragging) {
                        const rect = canvas.getBoundingClientRect();
                        cubeX = e.clientX - rect.left;
                        cubeY = e.clientY - rect.top;
                        drawCube(cubeX, cubeY);
                    }
                });
                
                canvas.addEventListener('mouseup', () => {
                    dragging = false;
                    document.getElementById('status').textContent = '🟦 Cube placed';
                    document.getElementById('status').style.color = '#00ff88';
                });
                
                canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const rect = canvas.getBoundingClientRect();
                    const tx = e.touches[0].clientX - rect.left;
                    const ty = e.touches[0].clientY - rect.top;
                    if (Math.abs(tx - cubeX) < 60 && Math.abs(ty - cubeY) < 60) {
                        dragging = true;
                    }
                });
                
                canvas.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    if (dragging) {
                        const rect = canvas.getBoundingClientRect();
                        cubeX = e.touches[0].clientX - rect.left;
                        cubeY = e.touches[0].clientY - rect.top;
                        drawCube(cubeX, cubeY);
                    }
                });
                
                canvas.addEventListener('touchend', () => {
                    dragging = false;
                });
            }
            
            function initApp() {
                try {
                    loadingText.textContent = 'Setting up 3D scene...';
                    
                    const canvas = document.getElementById('canvas');
                    const video = document.getElementById('video');
                    const statusDiv = document.getElementById('status');
                    const placeBtn = document.getElementById('placeBtn');
                    const resetBtn = document.getElementById('resetBtn');
                    
                    // Three.js setup
                    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
                    renderer.setSize(window.innerWidth, window.innerHeight);
                    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                    
                    const scene = new THREE.Scene();
                    const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.01, 100);
                    camera.position.set(0, 0, 0);
                    
                    // Create cube
                    const cubeGroup = new THREE.Group();
                    const cubeSize = 0.15;
                    
                    const colors = [
                        { color: 0xff006e, offset: [0.003, 0, 0] },
                        { color: 0x00f5d4, offset: [-0.003, 0, 0] },
                        { color: 0x3a86ff, offset: [0, 0.003, 0] },
                        { color: 0xffbe0b, offset: [0, -0.003, 0] },
                        { color: 0x8338ec, offset: [0, 0, 0.003] },
                        { color: 0xfb5607, offset: [0, 0, -0.003] }
                    ];
                    
                    const wireframes = [];
                    colors.forEach(({ color, offset }) => {
                        const geom = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);
                        const edges = new THREE.EdgesGeometry(geom);
                        const wire = new THREE.LineSegments(
                            edges,
                            new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.8 })
                        );
                        wire.position.set(...offset);
                        cubeGroup.add(wire);
                        wireframes.push(wire);
                    });
                    
                    // Corner dots
                    const dotGeom = new THREE.SphereGeometry(0.006, 8, 8);
                    const dotMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                    for (let x = -0.5; x <= 0.5; x++) {
                        for (let y = -0.5; y <= 0.5; y++) {
                            for (let z = -0.5; z <= 0.5; z++) {
                                const dot = new THREE.Mesh(dotGeom, dotMat);
                                dot.position.set(x*cubeSize, y*cubeSize, z*cubeSize);
                                cubeGroup.add(dot);
                            }
                        }
                    }
                    
                    cubeGroup.visible = false;
                    scene.add(cubeGroup);
                    
                    let cubePlaced = false;
                    let isGrabbing = false;
                    
                    function releaseCube() {
                        isGrabbing = false;
                        wireframes.forEach(w => w.material.opacity = 0.8);
                        statusDiv.textContent = '🟦 Cube placed';
                        statusDiv.style.color = '#00ff88';
                    }
                    
                    // Buttons
                    placeBtn.addEventListener('click', () => {
                        if (!cubePlaced) {
                            cubeGroup.position.set(0, 0, -0.8);
                            cubeGroup.visible = true;
                            cubePlaced = true;
                            statusDiv.textContent = '🟦 Cube placed! Grab with mouse';
                            statusDiv.style.color = '#00ff88';
                            if (navigator.vibrate) navigator.vibrate([50,50,50]);
                        }
                    });
                    
                    resetBtn.addEventListener('click', () => {
                        cubeGroup.position.set(0, 0, -0.8);
                        cubeGroup.visible = false;
                        cubePlaced = false;
                        releaseCube();
                        statusDiv.textContent = '🔄 Reset';
                        statusDiv.style.color = '#fff';
                    });
                    
                    // Mouse interaction
                    let mouseDown = false;
                    
                    canvas.addEventListener('mousedown', () => {
                        if (cubePlaced) {
                            isGrabbing = true;
                            wireframes.forEach(w => w.material.opacity = 1);
                            statusDiv.textContent = '✊ Grabbed! Move mouse';
                            statusDiv.style.color = '#ffff00';
                        }
                        mouseDown = true;
                    });
                    
                    canvas.addEventListener('mouseup', () => {
                        if (isGrabbing) releaseCube();
                        mouseDown = false;
                    });
                    
                    canvas.addEventListener('mousemove', (e) => {
                        if (mouseDown && isGrabbing) {
                            const x = (e.clientX/window.innerWidth)*2 - 1;
                            const y = -(e.clientY/window.innerHeight)*2 + 1;
                            cubeGroup.position.x = x * 0.5;
                            cubeGroup.position.y = y * 0.5;
                        }
                    });
                    
                    // Touch support
                    canvas.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        if (cubePlaced) {
                            isGrabbing = true;
                            wireframes.forEach(w => w.material.opacity = 1);
                            statusDiv.textContent = '✊ Grabbed!';
                            statusDiv.style.color = '#ffff00';
                        }
                    });
                    
                    canvas.addEventListener('touchmove', (e) => {
                        e.preventDefault();
                        if (isGrabbing) {
                            const x = (e.touches[0].clientX/window.innerWidth)*2 - 1;
                            const y = -(e.touches[0].clientY/window.innerHeight)*2 + 1;
                            cubeGroup.position.x = x * 0.5;
                            cubeGroup.position.y = y * 0.5;
                        }
                    });
                    
                    canvas.addEventListener('touchend', (e) => {
                        e.preventDefault();
                        if (isGrabbing) releaseCube();
                    });
                    
                    // Keyboard
                    window.addEventListener('keydown', (e) => {
                        if (e.key === 'p') placeBtn.click();
                        if (e.key === 'r') resetBtn.click();
                    });
                    
                    // Resize
                    window.addEventListener('resize', () => {
                        camera.aspect = window.innerWidth/window.innerHeight;
                        camera.updateProjectionMatrix();
                        renderer.setSize(window.innerWidth, window.innerHeight);
                    });
                    
                    // Animation
                    function animate() {
                        requestAnimationFrame(animate);
                        if (cubeGroup.visible && !isGrabbing) {
                            wireframes.forEach((w, i) => {
                                w.rotation.x += 0.002 * (i+1);
                                w.rotation.y += 0.002 * (i+1);
                            });
                        }
                        renderer.render(scene, camera);
                    }
                    
                    animate();
                    
                    // Hide loading
                    loadingScreen.style.display = 'none';
                    statusDiv.textContent = '✅ Ready! Place cube to start';
                    statusDiv.style.color = '#00ff88';
                    
                    // Try to init camera for hand tracking (optional)
                    initCameraOptional();
                    
                } catch (error) {
                    console.error('Init error:', error);
                    loadingScreen.style.display = 'none';
                    setupBasicMode();
                }
            }
            
            async function initCameraOptional() {
                try {
                    const video = document.getElementById('video');
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'environment', width: 640, height: 480 }
                    });
                    video.srcObject = stream;
                    video.style.display = 'block';
                    document.getElementById('status').textContent = '📷 Camera active';
                } catch (e) {
                    console.log('Camera not available:', e.message);
                }
            }
        })();
    </script>
</body>
</html>
