<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Block Builder</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--dark-bg);
            font-family: 'Courier New', 'Fira Code', monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            position: fixed;
        }

        #status-line {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: var(--neon-green);
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.7;
            text-align: center;
            pointer-events: none;
            text-shadow: 0 0 8px rgba(0, 255, 65, 0.4);
            transition: opacity 0.5s;
        }

        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #start-box {
            border: 2px solid var(--neon-green);
            padding: 48px 32px;
            text-align: center;
            color: var(--neon-green);
            background: rgba(0, 0, 0, 0.9);
            max-width: 340px;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.15), inset 0 0 30px rgba(0, 255, 65, 0.03);
        }

        #start-box h2 {
            font-size: 16px;
            letter-spacing: 5px;
            margin-bottom: 20px;
            font-weight: normal;
        }

        #start-box p {
            font-size: 11px;
            opacity: 0.6;
            margin-bottom: 28px;
            line-height: 1.7;
            letter-spacing: 1px;
        }

        #btn-start {
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 14px 40px;
            font-family: inherit;
            font-size: 13px;
            letter-spacing: 4px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        #btn-start:hover,
        #btn-start:active {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.6);
        }

        #btn-start:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .scanning-text {
            animation: scanPulse 1.5s infinite;
        }

        @keyframes scanPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <div id="start-box">
            <h2>AR BLOCK BUILDER</h2>
            <p>SHOW YOUR HANDS TO CAMERA<br>
               SCANNING INDEX AND THUMB<br>
               PINCH TO PLACE OR EXTRUDE</p>
            <button id="btn-start">ENTER AR</button>
        </div>
    </div>

    <div id="status-line">SHOW HANDS TO BEGIN</div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        // ============================================
        // GLOBAL STATE
        // ============================================
        const BLOCK_SIZE = 0.08; // 8cm blocks in world space
        const EXTRUDE_DISTANCE = 0.09;
        const PINCH_THRESHOLD = 0.025;

        let xrSession = null;
        let xrReferenceSpace = null;
        let xrHands = null;
        let scene, camera, renderer;
        let blocks = [];
        let handMeshes = [];
        let pinchWasDetected = false;
        let stablePinchCounter = 0;
        const STABLE_PINCH_FRAMES = 8;

        // ============================================
        // THREE.JS SETUP (Minimal)
        // ============================================
        function setupThreeJS() {
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(70, 1, 0.01, 50);

            renderer = new THREE.WebGLRenderer({
                antialias: true,
                alpha: true,
            });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            renderer.setClearColor(0x000000, 0);
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
        }

        // ============================================
        // WIREFRAME BLOCK
        // ============================================
        function createWireframeBlock(position) {
            const group = new THREE.Group();
            const half = BLOCK_SIZE / 2;

            const geo = new THREE.BoxGeometry(BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
            const mat = new THREE.MeshBasicMaterial({
                color: 0x00ff41,
                transparent: true,
                opacity: 0.06,
                depthWrite: false,
            });
            const innerBox = new THREE.Mesh(geo, mat);
            group.add(innerBox);

            const edgesGeo = new THREE.EdgesGeometry(geo);
            const edgesMat = new THREE.LineBasicMaterial({
                color: 0x00ff41,
                transparent: true,
                opacity: 0.9,
            });
            const wireframe = new THREE.LineSegments(edgesGeo, edgesMat);
            group.add(wireframe);

            // Corner dots
            const corners = [
                [-half, -half, -half], [half, -half, -half],
                [-half, half, -half], [half, half, -half],
                [-half, -half, half], [half, -half, half],
                [-half, half, half], [half, half, half],
            ];
            corners.forEach(c => {
                const dotGeo = new THREE.SphereGeometry(0.006, 6, 6);
                const dotMat = new THREE.MeshBasicMaterial({ color: 0x00ff41 });
                const dot = new THREE.Mesh(dotGeo, dotMat);
                dot.position.set(...c);
                group.add(dot);
            });

            group.position.copy(position);
            group.userData = {
                isBlock: true,
                blockId: crypto.randomUUID(),
                halfSize: half,
            };

            return group;
        }

        // ============================================
        // FIND NEAREST FACE FOR EXTRUSION
        // ============================================
        function findNearestFace(point) {
            let bestBlock = null;
            let bestNormal = null;
            let bestDist = 0.06;

            const faceNormals = [
                new THREE.Vector3(0, 1, 0),
                new THREE.Vector3(0, -1, 0),
                new THREE.Vector3(1, 0, 0),
                new THREE.Vector3(-1, 0, 0),
                new THREE.Vector3(0, 0, 1),
                new THREE.Vector3(0, 0, -1),
            ];

            for (const block of blocks) {
                const half = block.userData.halfSize;
                const bp = block.position;

                const faceOffsets = [
                    new THREE.Vector3(0, half, 0),
                    new THREE.Vector3(0, -half, 0),
                    new THREE.Vector3(half, 0, 0),
                    new THREE.Vector3(-half, 0, 0),
                    new THREE.Vector3(0, 0, half),
                    new THREE.Vector3(0, 0, -half),
                ];

                for (let i = 0; i < 6; i++) {
                    const faceCenter = bp.clone().add(faceOffsets[i]);
                    const dist = point.distanceTo(faceCenter);
                    if (dist < bestDist) {
                        bestDist = dist;
                        bestBlock = block;
                        bestNormal = faceNormals[i];
                    }
                }
            }

            return { block: bestBlock, normal: bestNormal };
        }

        // ============================================
        // PLACE BLOCK
        // ============================================
        function placeBlock(position) {
            const block = createWireframeBlock(position);
            scene.add(block);
            blocks.push(block);
            return block;
        }

        // ============================================
        // EXTRUDE BLOCK
        // ============================================
        function extrudeBlock(sourceBlock, normal) {
            const offset = normal.clone().multiplyScalar(BLOCK_SIZE * 1.05);
            const newPos = sourceBlock.position.clone().add(offset);
            const block = createWireframeBlock(newPos);
            scene.add(block);
            blocks.push(block);

            // Extrude animation
            block.scale.set(0.01, 0.01, 0.01);
            const startTime = performance.now();
            const duration = 250;

            function animateExtrude(time) {
                const elapsed = time - startTime;
                const progress = Math.min(elapsed / duration, 1.0);
                const eased = 1 - Math.pow(1 - progress, 3);
                block.scale.setScalar(eased);
                if (progress < 1) {
                    requestAnimationFrame(animateExtrude);
                }
            }
            requestAnimationFrame(animateExtrude);

            return block;
        }

        // ============================================
        // HAND JOINT MESHES
        // ============================================
        function createJointMesh() {
            const geo = new THREE.SphereGeometry(0.006, 8, 8);
            const mat = new THREE.MeshBasicMaterial({
                color: 0x00ff41,
                transparent: true,
                opacity: 0.7,
            });
            return new THREE.Mesh(geo, mat);
        }

        function createConnectionLine() {
            const geo = new THREE.BufferGeometry();
            const mat = new THREE.LineBasicMaterial({
                color: 0x00ff41,
                transparent: true,
                opacity: 0.4,
            });
            return new THREE.Line(geo, mat);
        }

        function setupHandVisuals() {
            handMeshes = [];
            for (let h = 0; h < 2; h++) {
                const handGroup = new THREE.Group();
                const joints = [];
                for (let i = 0; i < 25; i++) {
                    const joint = createJointMesh();
                    joint.visible = false;
                    handGroup.add(joint);
                    joints.push(joint);
                }
                handGroup.userData = { joints };
                handMeshes.push(handGroup);
                scene.add(handGroup);
            }
        }

        function updateHandVisuals(handIndex, joints) {
            const handGroup = handMeshes[handIndex];
            const jointMeshes = handGroup.userData.joints;

            // Thumb: 1,2,3,4
            // Index: 5,6,7,8
            const thumbTip = joints[4];
            const indexTip = joints[8];

            for (let i = 0; i < joints.length; i++) {
                if (joints[i]) {
                    jointMeshes[i].position.copy(joints[i]);
                    jointMeshes[i].visible = true;
                }
            }

            // Highlight index tip and thumb tip
            if (jointMeshes[4]) {
                jointMeshes[4].material.opacity = 1.0;
                jointMeshes[4].scale.setScalar(1.8);
            }
            if (jointMeshes[8]) {
                jointMeshes[8].material.opacity = 1.0;
                jointMeshes[8].scale.setScalar(1.8);
            }

            return { thumbTip, indexTip };
        }

        // ============================================
        // HAND TRACKING SETUP
        // ============================================
        function setupHandTracking() {
            xrHands = {
                left: null,
                right: null,
            };
        }

        function getHandJoints(hand) {
            if (!hand) return null;
            const joints = [];
            for (let i = 0; i < 25; i++) {
                const joint = hand.getJoint(i);
                if (joint) {
                    joints.push(new THREE.Vector3(
                        joint.position.x,
                        joint.position.y,
                        joint.position.z
                    ));
                } else {
                    joints.push(null);
                }
            }
            return joints;
        }

        // ============================================
        // MAIN XR LOOP
        // ============================================
        function onXRFrame(time, frame) {
            const session = frame.session;
            const refSpace = xrReferenceSpace;

            // Get hand data
            const inputSources = session.inputSources;
            let leftHand = null;
            let rightHand = null;

            for (const source of inputSources) {
                if (source.hand) {
                    if (source.handedness === 'left') leftHand = source.hand;
                    if (source.handedness === 'right') rightHand = source.hand;
                }
            }

            // Process right hand (primary)
            const primaryHand = rightHand || leftHand;
            let thumbTip = null;
            let indexTip = null;

            if (primaryHand) {
                const joints = getHandJoints(primaryHand);
                if (joints) {
                    const result = updateHandVisuals(0, joints);
                    thumbTip = result.thumbTip;
                    indexTip = result.indexTip;
                }
            } else {
                // Hide hand visuals
                if (handMeshes[0]) {
                    handMeshes[0].userData.joints.forEach(j => j.visible = false);
                }
            }

            // Process second hand
            const secondaryHand = (rightHand && leftHand) ? leftHand : null;
            if (secondaryHand) {
                const joints = getHandJoints(secondaryHand);
                if (joints) {
                    updateHandVisuals(1, joints);
                }
            } else if (handMeshes[1]) {
                handMeshes[1].userData.joints.forEach(j => j.visible = false);
            }

            // Pinch detection
            let isPinching = false;
            if (thumbTip && indexTip) {
                const pinchDist = thumbTip.distanceTo(indexTip);
                isPinching = pinchDist < PINCH_THRESHOLD;
            }

            // Stable pinch debounce
            if (isPinching) {
                stablePinchCounter++;
            } else {
                stablePinchCounter = 0;
            }

            const stablePinch = stablePinchCounter >= STABLE_PINCH_FRAMES;
            const pinchJustTriggered = stablePinch && !pinchWasDetected;
            pinchWasDetected = stablePinch;

            // Status update
            const statusLine = document.getElementById('status-line');
            if (!primaryHand) {
                statusLine.textContent = 'SHOW HANDS TO CAMERA';
                statusLine.classList.add('scanning-text');
            } else if (isPinching) {
                statusLine.textContent = 'PINCH DETECTED';
                statusLine.classList.remove('scanning-text');
            } else {
                statusLine.textContent = `BLOCKS: ${blocks.length}`;
                statusLine.classList.remove('scanning-text');
            }

            // Handle pinch action
            if (pinchJustTriggered && indexTip) {
                const faceResult = findNearestFace(indexTip);

                if (faceResult.block && faceResult.normal) {
                    extrudeBlock(faceResult.block, faceResult.normal);
                } else {
                    placeBlock(indexTip.clone());
                }
            }

            renderer.render(scene, camera);
        }

        // ============================================
        // START AR SESSION
        // ============================================
        async function startARSession() {
            if (!navigator.xr) {
                alert('WebXR not supported on this device/browser.');
                return;
            }

            const isSupported = await navigator.xr.isSessionSupported('immersive-ar');
            if (!isSupported) {
                alert('Immersive AR not supported. Try Chrome on Android with ARCore.');
                return;
            }

            const session = await navigator.xr.requestSession('immersive-ar', {
                requiredFeatures: ['hand-tracking'],
                optionalFeatures: ['local', 'hit-test'],
            });

            xrSession = session;
            xrReferenceSpace = await session.requestReferenceSpace('local');

            renderer.xr.setReferenceSpaceType('local');
            await renderer.xr.setSession(session);

            // Set up hand tracking
            setupHandTracking();
            setupHandVisuals();

            // Maintain camera aspect ratio
            session.addEventListener('end', () => {
                xrSession = null;
                document.getElementById('status-line').textContent = 'SESSION ENDED';
                document.getElementById('start-overlay').style.display = 'flex';
                document.getElementById('btn-start').disabled = false;
                document.getElementById('btn-start').textContent = 'ENTER AR';
            });

            // Use the XR frame loop
            renderer.setAnimationLoop((time, frame) => {
                if (frame) {
                    onXRFrame(time, frame);
                }
            });

            // Hide overlay
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('status-line').textContent = 'SHOW HANDS TO CAMERA';
        }

        // ============================================
        // INIT
        // ============================================
        function init() {
            setupThreeJS();

            document.getElementById('btn-start').addEventListener('click', async () => {
                const btn = document.getElementById('btn-start');
                btn.disabled = true;
                btn.textContent = 'STARTING...';
                await startARSession();
            });

            // Handle resize - maintain aspect ratio
            window.addEventListener('resize', () => {
                if (renderer) {
                    renderer.setSize(window.innerWidth, window.innerHeight);
                }
            });
        }

        init();
        console.log('AR BLOCK BUILDER - WebXR Hand Tracking');
        console.log('Show hands to camera. Pinch index+thumb to place or extrude blocks.');
    </script>
</body>
</html>
