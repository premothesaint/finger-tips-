<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Wireframe Cube</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            background: #000;
            touch-action: manipulation;
            height: 100vh;
            width: 100vw;
            position: fixed;
            -webkit-tap-highlight-color: transparent;
        }
        
        #canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        
        #video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            display: none;
            transform: scaleX(-1);
        }
        
        #permission-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            color: white;
            text-align: center;
            padding: 20px;
        }
        
        #permission-screen h2 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #00ff88;
        }
        
        #permission-screen p {
            font-size: 16px;
            margin-bottom: 30px;
            opacity: 0.8;
            max-width: 300px;
            line-height: 1.5;
        }
        
        #permission-screen button {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            animation: pulse 2s infinite;
        }
        
        #permission-screen button:active {
            transform: scale(0.95);
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0,255,136,0.4); }
            70% { box-shadow: 0 0 0 20px rgba(0,255,136,0); }
            100% { box-shadow: 0 0 0 0 rgba(0,255,136,0); }
        }
        
        #ui {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        #status {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            max-width: 90%;
            transition: all 0.3s;
        }
        
        #controls {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            pointer-events: auto;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        button.ui-btn {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #fff;
            border: 2px solid rgba(255,255,255,0.3);
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            min-width: 110px;
        }
        
        button.ui-btn:active {
            transform: scale(0.93);
        }
        
        button.primary {
            background: rgba(0,255,136,0.25);
            border-color: rgba(0,255,136,0.6);
            color: #00ff88;
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <video id="video" autoplay playsinline muted></video>
    
    <!-- Step 1: Permission Screen -->
    <div id="permission-screen">
        <h2>🎯 AR Cube Experience</h2>
        <p>This app needs camera and motion sensors to work. Please allow access when prompted.</p>
        <button id="startBtn">✨ Start Experience</button>
    </div>
    
    <!-- Step 2: UI Overlay -->
    <div id="ui" class="hidden">
        <div id="status">📱 Ready - Place the cube</div>
        <div id="controls">
            <button class="ui-btn primary" id="placeBtn">📦 Place Cube</button>
            <button class="ui-btn" id="resetBtn">🔄 Reset</button>
        </div>
    </div>

    <script>
        // Wait for DOM
        document.addEventListener('DOMContentLoaded', function() {
            
            // Elements
            const permissionScreen = document.getElementById('permission-screen');
            const startBtn = document.getElementById('startBtn');
            const uiOverlay = document.getElementById('ui');
            const statusDiv = document.getElementById('status');
            const placeBtn = document.getElementById('placeBtn');
            const resetBtn = document.getElementById('resetBtn');
            const canvas = document.getElementById('canvas');
            const video = document.getElementById('video');
            
            // State
            let cubePlaced = false;
            let isGrabbing = false;
            let motionEnabled = false;
            let cameraStream = null;
            let threeReady = false;
            
            // Step 1: Handle Start Button Click
            startBtn.addEventListener('click', async function() {
                startBtn.textContent = '⏳ Initializing...';
                startBtn.disabled = true;
                
                try {
                    // Request Device Motion Permission (iOS 13+)
                    if (typeof DeviceMotionEvent !== 'undefined' && 
                        typeof DeviceMotionEvent.requestPermission === 'function') {
                        
                        statusDiv.textContent = '🎯 Please allow motion access...';
                        const motionPermission = await DeviceMotionEvent.requestPermission();
                        
                        if (motionPermission === 'granted') {
                            motionEnabled = true;
                            console.log('✅ Motion permission granted');
                        } else {
                            console.log('⚠️ Motion permission denied');
                        }
                    } else {
                        // Android or older iOS - motion is available by default
                        motionEnabled = true;
                        console.log('✅ Motion available by default');
                    }
                    
                    // Request Camera Permission
                    statusDiv.textContent = '📷 Please allow camera access...';
                    
                    try {
                        cameraStream = await navigator.mediaDevices.getUserMedia({
                            video: {
                                facingMode: 'environment',
                                width: { ideal: 640 },
                                height: { ideal: 480 }
                            }
                        });
                        
                        video.srcObject = cameraStream;
                        await video.play();
                        video.style.display = 'block';
                        console.log('✅ Camera active');
                        
                    } catch (cameraError) {
                        console.log('⚠️ Camera not available:', cameraError.message);
                        statusDiv.textContent = '📱 Camera unavailable - Using touch mode';
                    }
                    
                    // Hide permission screen, show UI
                    permissionScreen.classList.add('hidden');
                    uiOverlay.classList.remove('hidden');
                    
                    // Initialize Three.js
                    statusDiv.textContent = '⚡ Loading 3D engine...';
                    await initThreeJS();
                    
                    threeReady = true;
                    statusDiv.textContent = '✅ Ready! Tap "Place Cube" to start';
                    statusDiv.style.color = '#00ff88';
                    
                } catch (error) {
                    console.error('Setup error:', error);
                    permissionScreen.classList.add('hidden');
                    uiOverlay.classList.remove('hidden');
                    statusDiv.textContent = '⚠️ Setup incomplete - Basic mode';
                    statusDiv.style.color = '#ffbe0b';
                    initBasicMode();
                }
            });
            
            // Step 2: Initialize Three.js
            function initThreeJS() {
                return new Promise((resolve, reject) => {
                    // Load Three.js dynamically
                    const script = document.createElement('script');
                    script.src = 'https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js';
                    
                    script.onload = function() {
                        try {
                            setupThreeJSScene();
                            resolve();
                        } catch (e) {
                            reject(e);
                        }
                    };
                    
                    script.onerror = function() {
                        console.log('Three.js CDN failed, using basic mode');
                        initBasicMode();
                        resolve(); // Resolve anyway - basic mode is running
                    };
                    
                    // Timeout after 5 seconds
                    setTimeout(() => {
                        if (!threeReady) {
                            console.log('Three.js timeout, using basic mode');
                            initBasicMode();
                            resolve();
                        }
                    }, 5000);
                    
                    document.head.appendChild(script);
                });
            }
            
            // Step 3: Setup Three.js Scene
            let scene, camera, renderer, cubeGroup, wireframes;
            let cubePlacedIn3D = false;
            
            function setupThreeJSScene() {
                renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                
                scene = new THREE.Scene();
                camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.01, 100);
                camera.position.set(0, 0, 0);
                
                // Create wireframe cube
                cubeGroup = new THREE.Group();
                const cubeSize = 0.15;
                
                const colors = [
                    { color: 0xff006e, offset: [0.004, 0, 0] },
                    { color: 0x00f5d4, offset: [-0.004, 0, 0] },
                    { color: 0x3a86ff, offset: [0, 0.004, 0] },
                    { color: 0xffbe0b, offset: [0, -0.004, 0] },
                    { color: 0x8338ec, offset: [0, 0, 0.004] },
                    { color: 0xfb5607, offset: [0, 0, -0.004] }
                ];
                
                wireframes = [];
                colors.forEach(({ color, offset }) => {
                    const geom = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);
                    const edges = new THREE.EdgesGeometry(geom);
                    const wire = new THREE.LineSegments(
                        edges,
                        new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.8 })
                    );
                    wire.position.set(...offset);
                    cubeGroup.add(wire);
                    wireframes.push(wire);
                });
                
                // Corner dots
                const dotGeom = new THREE.SphereGeometry(0.006, 8, 8);
                const dotMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                for (let x = -0.5; x <= 0.5; x++) {
                    for (let y = -0.5; y <= 0.5; y++) {
                        for (let z = -0.5; z <= 0.5; z++) {
                            const dot = new THREE.Mesh(dotGeom, dotMat);
                            dot.position.set(x*cubeSize, y*cubeSize, z*cubeSize);
                            cubeGroup.add(dot);
                        }
                    }
                }
                
                cubeGroup.visible = false;
                scene.add(cubeGroup);
                
                // Start render loop
                function animate() {
                    requestAnimationFrame(animate);
                    
                    if (cubeGroup && cubeGroup.visible && !isGrabbing) {
                        wireframes.forEach((w, i) => {
                            w.rotation.x += 0.003 * (i + 1);
                            w.rotation.y += 0.003 * (i + 1);
                        });
                    }
                    
                    if (renderer && scene && camera) {
                        renderer.render(scene, camera);
                    }
                }
                
                animate();
                threeReady = true;
            }
            
            // Step 4: Basic Canvas Fallback Mode
            function initBasicMode() {
                const ctx = canvas.getContext('2d');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                
                let cubeX = canvas.width / 2;
                let cubeY = canvas.height / 2;
                let isDragging = false;
                
                function drawCube(x, y) {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    const size = 80;
                    
                    // Multiple wireframe layers
                    ctx.strokeStyle = '#ff006e';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(x - size/2, y - size/2, size, size);
                    
                    ctx.strokeStyle = '#00f5d4';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x - size/2 + 8, y - size/2 + 8, size - 16, size - 16);
                    
                    ctx.strokeStyle = '#3a86ff';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(x - size/2 - 8, y - size/2 - 8, size + 16, size + 16);
                    
                    // Corners
                    ctx.fillStyle = '#fff';
                    [[-1,-1], [1,-1], [-1,1], [1,1]].forEach(([cx, cy]) => {
                        ctx.beginPath();
                        ctx.arc(x + cx*size/2, y + cy*size/2, 4, 0, Math.PI*2);
                        ctx.fill();
                    });
                    
                    // Center dot
                    ctx.beginPath();
                    ctx.arc(x, y, 3, 0, Math.PI*2);
                    ctx.fillStyle = '#00ff88';
                    ctx.fill();
                }
                
                drawCube(cubeX, cubeY);
                
                // Mouse events
                canvas.addEventListener('mousedown', (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const mx = e.clientX - rect.left;
                    const my = e.clientY - rect.top;
                    
                    if (Math.abs(mx - cubeX) < 50 && Math.abs(my - cubeY) < 50) {
                        isDragging = true;
                        statusDiv.textContent = '✊ Grabbed! Move to lift';
                        statusDiv.style.color = '#ffff00';
                    }
                });
                
                canvas.addEventListener('mousemove', (e) => {
                    if (isDragging) {
                        const rect = canvas.getBoundingClientRect();
                        cubeX = e.clientX - rect.left;
                        cubeY = e.clientY - rect.top;
                        drawCube(cubeX, cubeY);
                    }
                });
                
                canvas.addEventListener('mouseup', () => {
                    isDragging = false;
                    statusDiv.textContent = '🟦 Cube placed';
                    statusDiv.style.color = '#00ff88';
                });
                
                // Touch events
                canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const rect = canvas.getBoundingClientRect();
                    const tx = e.touches[0].clientX - rect.left;
                    const ty = e.touches[0].clientY - rect.top;
                    
                    if (Math.abs(tx - cubeX) < 50 && Math.abs(ty - cubeY) < 50) {
                        isDragging = true;
                        statusDiv.textContent = '✊ Grabbed!';
                        statusDiv.style.color = '#ffff00';
                    }
                });
                
                canvas.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    if (isDragging) {
                        const rect = canvas.getBoundingClientRect();
                        cubeX = e.touches[0].clientX - rect.left;
                        cubeY = e.touches[0].clientY - rect.top;
                        drawCube(cubeX, cubeY);
                    }
                });
                
                canvas.addEventListener('touchend', () => {
                    isDragging = false;
                    statusDiv.textContent = '🟦 Cube placed';
                    statusDiv.style.color = '#00ff88';
                });
                
                cubePlaced = true;
            }
            
            // Button Handlers
            placeBtn.addEventListener('click', () => {
                if (!cubePlaced) {
                    if (threeReady && cubeGroup) {
                        cubeGroup.position.set(0, 0, -0.8);
                        cubeGroup.visible = true;
                    } else if (!threeReady) {
                        initBasicMode();
                    }
                    cubePlaced = true;
                    statusDiv.textContent = '🟦 Cube placed! Grab and lift it';
                    statusDiv.style.color = '#00ff88';
                    if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
                }
            });
            
            resetBtn.addEventListener('click', () => {
                if (threeReady && cubeGroup) {
                    cubeGroup.position.set(0, 0, -0.8);
                    cubeGroup.visible = false;
                }
                cubePlaced = false;
                isGrabbing = false;
                statusDiv.textContent = '🔄 Reset - Place cube again';
                statusDiv.style.color = '#ffffff';
                if (navigator.vibrate) navigator.vibrate(100);
            });
            
            // 3D Mouse/Touch interaction for Three.js mode
            canvas.addEventListener('mousedown', (e) => {
                if (cubePlaced && threeReady && cubeGroup && cubeGroup.visible) {
                    isGrabbing = true;
                    wireframes.forEach(w => w.material.opacity = 1);
                    statusDiv.textContent = '✊ Grabbed! Move to lift';
                    statusDiv.style.color = '#ffff00';
                }
            });
            
            canvas.addEventListener('mouseup', () => {
                if (isGrabbing && threeReady) {
                    isGrabbing = false;
                    wireframes.forEach(w => w.material.opacity = 0.8);
                    statusDiv.textContent = '🟦 Cube placed';
                    statusDiv.style.color = '#00ff88';
                }
            });
            
            canvas.addEventListener('mousemove', (e) => {
                if (isGrabbing && threeReady && cubeGroup) {
                    const x = (e.clientX / window.innerWidth) * 2 - 1;
                    const y = -(e.clientY / window.innerHeight) * 2 + 1;
                    cubeGroup.position.x = x * 0.5;
                    cubeGroup.position.y = y * 0.5;
                }
            });
            
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (cubePlaced && threeReady && cubeGroup && cubeGroup.visible) {
                    isGrabbing = true;
                    wireframes.forEach(w => w.material.opacity = 1);
                    statusDiv.textContent = '✊ Grabbed!';
                    statusDiv.style.color = '#ffff00';
                }
            });
            
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (isGrabbing && threeReady && cubeGroup) {
                    const x = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
                    const y = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
                    cubeGroup.position.x = x * 0.5;
                    cubeGroup.position.y = y * 0.5;
                }
            });
            
            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                if (isGrabbing && threeReady) {
                    isGrabbing = false;
                    wireframes.forEach(w => w.material.opacity = 0.8);
                    statusDiv.textContent = '🟦 Cube placed';
                    statusDiv.style.color = '#00ff88';
                }
            });
            
            // Keyboard shortcuts
            window.addEventListener('keydown', (e) => {
                if (e.key === 'p' || e.key === 'P') placeBtn.click();
                if (e.key === 'r' || e.key === 'R') resetBtn.click();
            });
            
            // Handle resize
            window.addEventListener('resize', () => {
                if (threeReady && camera) {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                }
            });
            
            // Device motion handler
            if (motionEnabled) {
                window.addEventListener('deviceorientation', (event) => {
                    if (cubePlaced && threeReady && cubeGroup && !isGrabbing) {
                        const beta = event.beta || 0;  // Forward/backward tilt
                        const gamma = event.gamma || 0; // Left/right tilt
                        
                        cubeGroup.position.x += gamma * 0.001;
                        cubeGroup.position.y += beta * 0.001;
                    }
                });
            }
            
            console.log('✅ AR Cube ready!');
            console.log('📱 Click "Start Experience" to begin');
            console.log('🎮 Controls: Place cube → Grab with mouse/touch → Lift!');
        });
    </script>
</body>
</html>
